<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 入門工作坊報名表</title>
</head>
<body>
  <header>
    <h1>HTML 入門工作坊</h1>
    <p>請填寫以下資料完成活動報名。</p>
  </header>

  <main>
    <section>
      <h2>報名表單</h2>
      <form action="/register" method="post">
        <fieldset>
          <legend>基本資料</legend>

          <p>
            <label for="full-name">姓名</label>
            <input type="text" id="full-name" name="full-name" required>
          </p>

          <p>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </p>

          <p>
            <label for="phone">電話</label>
            <input type="tel" id="phone" name="phone" placeholder="0912-345-678">
          </p>
        </fieldset>

        <fieldset>
          <legend>活動選項</legend>

          <p>
            <label for="session">參加場次</label>
            <select id="session" name="session" required>
              <option value="">請選擇場次</option>
              <option value="morning">上午場</option>
              <option value="afternoon">下午場</option>
              <option value="evening">晚上場</option>
            </select>
          </p>

          <p>學習程度</p>
          <p>
            <input type="radio" id="level-beginner" name="level" value="beginner" required>
            <label for="level-beginner">完全初學</label>
          </p>
          <p>
            <input type="radio" id="level-basic" name="level" value="basic">
            <label for="level-basic">看過一些 HTML</label>
          </p>

          <p>想加強的主題</p>
          <p>
            <input type="checkbox" id="topic-structure" name="topics" value="structure">
            <label for="topic-structure">文件結構</label>
          </p>
          <p>
            <input type="checkbox" id="topic-form" name="topics" value="form">
            <label for="topic-form">表單標籤</label>
          </p>
        </fieldset>

        <fieldset>
          <legend>補充說明</legend>
          <p>
            <label for="note">備註</label>
            <textarea id="note" name="note" rows="5" placeholder="可以寫下你想問的問題"></textarea>
          </p>
        </fieldset>

        <p>
          <button type="submit">送出報名</button>
          <button type="reset">重新填寫</button>
        </p>
      </form>
    </section>
  </main>

  <footer>
    <p>主辦單位：Frontend Learning Lab</p>
  </footer>
</body>
</html>
