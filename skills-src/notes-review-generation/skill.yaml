name: notes-review-generation
description: |
  當使用者要根據 notes/<章節>/*.md 生成 review/<章節>/*.md 複習材料（重點摘要、問答題、填空題、翻面卡片）時使用。review 為回憶檢索型教材，考「記不記得」，與 practice 的動手應用型（應用練習、實作任務、改錯、重構）互補；動手型一律歸 practice，review 不出要寫或改 HTML 的題。review 搭配遺忘曲線設計：產出檔承載「複習排程模板」（建議間隔、每張卡難度/權重、穩定卡片 ID），個人實際進度（到期日、熟練度）明確排除在外，交給外部 SRS 工具，靠卡片 ID 對應，因此產出檔可隨時重生成而不洗掉個人進度。分兩階段：第一階段掃描 notes/<章節>/*.md，判斷每篇是否適合做複習材料（可一對一、一對多、多對一或不生成），建立 review 規劃（每張卡的型式、難度、考點、答案方向、來源回溯，以及檔層 schedule_days 與 priority），並把考點或答案超出 notes 的內容列入需要人工確認；第二階段僅在使用者明確回覆「確認，請產生 review」後，寫入 review/<章節>/<NN-主題>.md，含 source_notes/topics/summary 與 review 排程 front matter，每張卡帶穩定 ID 與摺疊答案，並完成靜態檢查與來源回溯檢查。核心紅線：每張卡的考點與答案都不得超出 notes 教過的範圍。適用情境：使用者要求「review 生成」「產生複習材料」「複習卡/問答/填空/重點摘要」「搭配遺忘曲線複習」，或處理 meta/chapter-status.md 中「review 生成」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：notes 生成或內容審查（屬於 notes-generation、notes-content-review skill）、demos/practice/appendix 等其他下游教材生成、維護個人複習進度/到期日狀態、origin/atomic/notes 內容修改、資產標準化命名或 alt/連結文字整理。
