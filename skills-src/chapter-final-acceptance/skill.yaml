name: chapter-final-acceptance
description: |
  當使用者要對某個 HTML 章節做「最終驗收」，確認整章從 origin 到 atomic、notes、demos、practice、review、appendix 的所有處理階段都已正確完成、可作為一份完整交付物時使用。本 skill 是整章交付的整合閘門（release gate），不重做各層內部品質審查（那屬於 atomic-content-review、notes-content-review 等單層 skill），而是驗證前置閘門完整性、產出存在性、跨層來源追溯鏈、連結與資產完整性、索引與狀態一致性、front matter schema 合規，以及全章端到端連貫性。分兩階段：第一階段唯讀掃描該章各層產出與 meta/chapter-status.md、meta/chapter-logs/<章節>.md、meta/index.md，建立驗收檢查表與問題清單（沿用 S1-S4 嚴重度），對發現的問題一律列為「轉交項目」退回對應層 skill，本身不修改任何教材內容，並輸出通過/不通過裁決；第二階段僅在使用者完成人工核可後，回填 meta/chapter-status.md 該列（完成率、整體狀態、下一步、最終驗收欄）與 meta/chapter-logs/<章節>.md 驗收記錄，不更動任何教材檔案。適用情境：使用者要求對某章節做「最終驗收」「final acceptance」「整章驗收」「release gate」，或處理 meta/chapter-status.md 中「最終驗收」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：origin/atomic/notes/demos/practice/review/appendix 任何教材內容的生成或修改、單層內容審查（屬於 atomic-content-review、notes-content-review skill）、資產標準化命名或 alt/連結文字整理、更新範圍判斷（屬於 update-judgment skill）。
