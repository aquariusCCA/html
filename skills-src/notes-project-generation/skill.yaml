name: notes-project-generation
description: |
  當使用者要根據「跨多個章節的多篇 notes/<章節>/*.md」生成 projects/<專案-slug>/ 跨章節整合 HTML 專案（例如結合表單、語意化、全局屬性、路徑、表格的完整頁面）時使用。projects 是與 demos 平行但不同單位的選用層：demos 是單篇 notes 的微觀範例（demos/<章節>/<筆記名>/，1:1），projects 是綜合多知識點的宏觀場景（以「專案」而非「章節」為鍵、多來源追溯、跨章節），非每章節必經。分兩階段：第一階段掃描使用者指定的多個來源 notes（必要時跨章節讀取），先做前置就緒檢查（所有來源章節的「notes 索引元資料」皆須已完成），建立專案規劃（教學目標、要組裝的多篇 notes、頁面/互動設計、source_notes 多來源清單、prerequisites 前置章節、輸出目錄、需人工確認項目），並判斷是否該生成；第二階段僅在使用者明確回覆「確認，請產生 projects」後，寫入 projects/<專案-slug>/，產生含 source_notes/topics/summary/prerequisites/level front matter 的 project.md 與可獨立開啟執行的 index.html 及必要 CSS/JS/assets，最後重建 meta/projects-index.md 並完成靜態檢查與可行時的瀏覽器驗證。核心紅線：專案只能組裝 source_notes 清單所列各篇 notes 已教過技術的聯集，不得引入任何一篇來源 notes 都未涵蓋的新知識。適用情境：使用者要求「跨章節整合 demo」「綜合專案」「projects 生成」「結合多章做一個完整頁面」，或處理 meta/projects-index.md 中尚未生成的整合專案。不適用於：單篇 notes 的微觀 demo（屬於 notes-demo-generation skill，仍為單章 demos/）、notes 生成或內容審查（屬於 notes-generation、notes-content-review skill）、practice/review/appendix/supplements 等其他下游教材生成、origin/atomic/notes 內容修改、資產標準化命名或 alt/連結文字整理。
