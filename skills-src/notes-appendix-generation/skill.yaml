name: notes-appendix-generation
description: |
  當使用者要根據 notes/<章節>/*.md 生成 appendix/<章節>/*.md 查表型附錄資料（名詞表、屬性值表、標籤對照表、設定檔範例、速查清單）時使用。appendix 為選用層，僅在獨立成 appendix 的查表便利性明顯高於直接回頭翻 notes 時才生成，觸發標準是質性判斷而非計數門檻，寧可不建而不過度生成。分兩階段：第一階段掃描 notes/<章節>/*.md，先做章節適用性判斷（整章不適用時直接用簡短格式結束，不輸出完整規劃），建立 appendix 規劃（每張表的標題、對應 notes、內容類型、欄位設計），並把 notes 未涵蓋、無法回溯的內容列入需要人工確認；第二階段僅在使用者明確回覆「確認，請產生 appendix」後，寫入 appendix/<章節>/*.md，產生含 source_notes/topics/summary front matter 的查表 Markdown（front matter 僅此三欄，不加排程或難度欄位），並完成表格語法、來源存在與可回溯的靜態檢查。核心紅線：只重排 notes 已有的查表內容，一格都不得超出 notes。適用情境：使用者要求「appendix 生成」「附錄生成」「產生查表資料」「名詞表/屬性表/速查表」，或處理 meta/chapter-status.md 中「appendix 索引」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：notes 生成或內容審查（屬於 notes-generation、notes-content-review skill）、demos/practice/review 等其他下游教材生成、跨章節彙整總表、origin/atomic/notes 內容修改、資產標準化命名或 alt/連結文字整理。
