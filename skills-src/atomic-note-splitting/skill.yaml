name: atomic-note-splitting
description: |
  當使用者要將 origin/<章節>/*.md 中過長、過短或主題混雜的原始筆記重新整理成 atomic/<章節>/*.md 候選原子化筆記時使用。分兩階段：階段一掃描 origin/<章節>/*.md 並輸出切分提案（章節過長時先輸出 inventory），規劃拆分、合併、移動、保留、刪重與不納入項目，並標記需要人工確認的內容；階段二僅在使用者明確回覆「確認，請產生 atomic notes」後，依提案建立或更新 atomic/<章節>/*.md，並將本地資產路徑由 ./assets/... 改為 ../../origin/<章節>/assets/...。適用情境：使用者要求對某章節做「atomic 切分」「atomic 切分提案」「產生 atomic notes」「原子化整理」，或處理 meta/chapter-status.md 中「atomic 切分提案」或「atomic 產生」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：本地資產標準化命名（屬於 asset-standardization skill，須先完成或標記為不適用）、alt 與連結文字整理（屬於 asset-alt-and-link-text skill，須先完成或標記為不適用）、notes/review/practice/demos/appendix 等下游層級內容生成、教材正文深度重寫。
