name: notes-demo-generation
description: |
  當使用者要根據 notes/<章節>/*.md 生成可獨立開啟執行的 HTML 教學 demo 時使用。分兩階段：第一階段掃描 notes/<章節>/*.md，判斷每篇 notes 是否適合生成 demo，建立 demo 規劃（可一篇 notes 對一組 demo、一篇 notes 拆成多組 demo、多篇 notes 合併成一組 demo，或標記為不生成），並列出教學目標、互動/展示設計、輸出目錄與需要人工確認項目；第二階段僅在使用者明確回覆「確認，請產生 demos」後，寫入 demos/<章節>/<demo-slug>/，產生 index.html 及必要的 CSS/JS/資源，並完成靜態檢查與可行時的瀏覽器驗證。適用情境：使用者要求「demos 生成」「產生 demo」「根據 notes 產生 HTML 範例」「教學 demo」，或處理 meta/chapter-status.md 中「demos 生成」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：notes 生成或內容審查（屬於 notes-generation、notes-content-review skill）、practice/review/appendix 等其他下游教材生成、origin/atomic/notes 內容修改、資產標準化命名或 alt/連結文字整理。
