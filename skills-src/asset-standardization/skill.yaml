name: asset-standardization
description: |
  當使用者要對 origin/<章節>/ 中的本地資產（圖片、PDF、Excel、Word、音訊、影片、壓縮檔等）進行標準化命名時使用。掃描 origin/<章節>/*.md 中的本地資產引用（包含 Markdown fenced code block 內的 HTML src/href），將可唯一對應到 assets/ 內實體檔案的資產依規則改名為 <md-slug>-<asset-kind>-<index>-<hash6>.<ext>，並同步更新引用路徑為 ./assets/<分類>/<標準檔名>。適用情境：使用者要求對某章節做「資產命名」「資產標準化」，或處理 meta/chapter-status.md 中「資產命名」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：alt 文字或連結文字整理（屬於「alt 與連結文字」概念，另一階段）、atomic/notes 等下游層級的資產處理、教材內容重寫。
