name: notes-content-review
description: |
  當使用者要審查 notes/<章節>/*.md 正式教學筆記是否技術正確、教學完整、結構合理、來源可追溯，且足以作為 demos/practice/review/appendix 等下游教材生成來源時使用。分兩階段：第一階段掃描 notes/<章節>/*.md（必要時唯讀對照 atomic/<章節>/*.md 與 origin/<章節>/*.md），建立 Notes Inventory 與問題清單，標註問題類型（技術事實錯誤、範例程式碼錯誤、教學邏輯問題、內容覆蓋不足、生成偏差、結構品質問題、來源追溯問題、資產與連結問題、格式與維護性問題、需人工確認）、嚴重度（S1-S4）與信心；第二階段僅在使用者明確確認問題 ID 後，以最小變更修正 notes/<章節>/*.md。適用情境：使用者要求「notes content review」「notes 完成檢查」「notes 內容檢查」「審查正式教學筆記」「檢查 notes 是否能作為下游教材來源」，或處理 meta/chapter-status.md 中「notes 完成檢查」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：notes 生成或重構（屬於 notes-generation skill）、atomic 內容審查（屬於 atomic-content-review skill）、origin/atomic/資產檔案修改、demos/practice/review/appendix 等下游內容生成。
