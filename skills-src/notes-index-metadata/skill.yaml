name: notes-index-metadata
description: |
  當使用者要為 notes/<章節>/*.md 在既有 source_atomic YAML front matter 之後加上 topics 與 summary 欄位，以支援人類索引瀏覽與 AI 依使用者問題定位相關知識點時使用。分兩階段：第一階段掃描 notes/<章節>/*.md（若 meta/topics.md 已存在受控詞彙清單則優先沿用既有用詞，避免同義詞分裂），為每篇草擬 topics（2-5 個）與一句話 summary，標記詞彙無法對齊或語意模糊需要人工確認的項目；第二階段僅在使用者明確確認後，在每篇既有 front matter 後追加 topics 與 summary 兩個欄位，不更動 source_atomic、正文或其他內容。適用情境：使用者要求對某章節的 notes 做「索引 metadata 標記」「加 topics 和 summary」「建立筆記索引欄位」，或處理 meta/chapter-status.md 中對應欄位（若已建立）為「未開始」「進行中」或「待確認」的章節。不適用於：notes 正文重寫或品質審查（屬於 notes-generation、notes-content-review skill）、聚合 front matter 產生 meta/index.md（屬於 scripts/build-index.mjs 等聚合腳本，非本 skill 範圍）、atomic/origin 層級內容或資產處理。
