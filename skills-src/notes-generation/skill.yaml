name: notes-generation
description: |
  當使用者要將 atomic/<章節>/*.md 重構為 notes/<章節>/*.md 正式教學筆記時使用。分兩階段：階段一讀取 atomic/<章節>/*.md，建立 atomic -> notes 映射提案（含一對一/合併/補充型判斷、每篇預計 notes 的類型與教學構件的具體內容方向），標記需要人工確認的內容；階段二僅在使用者明確回覆「確認，請產生 notes」後，依提案重構為正式教學筆記並寫入 notes/<章節>/*.md，同時處理 source_atomic 來源與資產路徑。適用情境：使用者要求對某章節做「notes 生成」「產生教學筆記」「重構成正式筆記」，或處理 meta/chapter-status.md 中「notes 生成」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：atomic 切分與產生（屬於 atomic-note-splitting skill，須先完成）、atomic 內容審查（屬於 atomic-content-review skill，須先完成）、notes 完成後的內容審查（notes 完成檢查另一概念）、demos/practice/review/appendix 等下游層級內容生成。
