name: notes-practice-generation
description: |
  當使用者要根據 notes/<章節>/*.md 生成 practice/<章節>/*.md 練習題（應用練習題、實作任務、改錯題、重構題）時使用。practice 為動手應用型教材，與 review 的回憶檢索型（問答、填空、複習卡）互補；純問答/填空優先歸 review，practice 不重複出純記憶題。分兩階段：第一階段掃描 notes/<章節>/*.md，判斷每篇是否適合出練習（可一對一、一對多、多對一或不生成），建立 practice 規劃（每題的題型、難度、考點、解答方向、起始碼/起始檔需求、來源回溯），並把考點或解答超出 notes 的內容列入需要人工確認；第二階段僅在使用者明確回覆「確認，請產生 practice」後，寫入 practice/<章節>/<NN-主題>.md，每題附摺疊解答與解題說明，改錯/重構題需要可開啟修改的起始檔時於旁邊建 <NN-主題>-starter/ 放 starter.html，並完成靜態檢查與可解性/來源回溯檢查。核心紅線：題目考點與解答用到的技術都不得超出 notes 教過的範圍。適用情境：使用者要求「practice 生成」「產生練習題」「出題」「改錯題/重構題/實作任務」，或處理 meta/chapter-status.md 中「practice 生成」欄位為「未開始」「進行中」或「待確認」的章節。不適用於：notes 生成或內容審查（屬於 notes-generation、notes-content-review skill）、demos/review/appendix 等其他下游教材生成、origin/atomic/notes 內容修改、資產標準化命名或 alt/連結文字整理。
