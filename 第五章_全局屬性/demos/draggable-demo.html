<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>draggable Demo</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --paper: #fffaf2;
      --ink: #1d2a32;
      --muted: #6a747b;
      --line: #d9ccb8;
      --accent: #e27a3f;
      --accent-strong: #b95720;
      --drop: #d9efe0;
      --shadow: 0 18px 40px rgba(70, 49, 26, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(226, 122, 63, 0.18), transparent 28%),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    main {
      width: min(1000px, calc(100% - 32px));
      margin: 32px auto;
      padding: 24px;
      background: rgba(255, 250, 242, 0.9);
      border: 1px solid rgba(217, 204, 184, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
    }

    p {
      line-height: 1.7;
    }

    .lead {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0 24px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
    }

    button:hover {
      background: var(--accent-strong);
    }

    .layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .panel p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .drop-zone {
      min-height: 260px;
      border: 2px dashed var(--line);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      transition: border-color 160ms ease, background-color 160ms ease, transform 160ms ease;
    }

    .drop-zone.active {
      border-color: #4d9d68;
      background: var(--drop);
      transform: translateY(-2px);
    }

    .card {
      width: min(100%, 280px);
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #f1914a 0%, #dd6531 100%);
      color: #fff;
      box-shadow: 0 12px 24px rgba(226, 122, 63, 0.28);
      cursor: grab;
      user-select: none;
    }

    .card strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .card.dragging {
      opacity: 0.7;
      cursor: grabbing;
    }

    .log {
      margin-top: 20px;
      padding: 16px;
      border-radius: 18px;
      background: #172027;
      color: #d8eadf;
      min-height: 150px;
      font-family: Consolas, "Courier New", monospace;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .note {
      margin-top: 20px;
      padding: 16px 18px;
      border-left: 4px solid var(--accent);
      background: rgba(226, 122, 63, 0.08);
      border-radius: 12px;
      color: #574437;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 20px, 1000px);
        margin: 12px auto;
        padding: 18px;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>`draggable` Demo</h1>
    <p class="lead">
      這個示例只做一件事：把可拖曳元素和可放下區域拆開，讓你直接看到
      `draggable="true"`、`dragstart`、`dragover`、`drop`、`dragend` 是怎麼串起來的。
    </p>

    <div class="toolbar">
      <button id="resetButton" type="button">重設位置</button>
    </div>

    <section class="layout">
      <section class="panel">
        <h2>拖曳來源</h2>
        <p>這張卡片設定了 <code>draggable="true"</code>，所以可以被拖動。</p>
        <div class="drop-zone" id="sourceZone">
          <article class="card" id="dragCard" draggable="true">
            <strong>Drag Me</strong>
            把我拖到右邊的放置區，觀察事件日誌。
          </article>
        </div>
      </section>

      <section class="panel">
        <h2>放置目標</h2>
        <p>這個區塊在 <code>dragover</code> 時呼叫 <code>preventDefault()</code>，所以允許放下。</p>
        <div class="drop-zone" id="targetZone"></div>
      </section>
    </section>

    <section class="log" id="log" aria-live="polite"></section>

    <section class="note">
      注意：<code>draggable</code> 只負責「這個元素能不能被拖」，真正放下後要做什麼，還是要靠事件處理。
    </section>
  </main>

  <script>
    const dragCard = document.getElementById("dragCard");
    const sourceZone = document.getElementById("sourceZone");
    const targetZone = document.getElementById("targetZone");
    const log = document.getElementById("log");
    const resetButton = document.getElementById("resetButton");

    function writeLog(message) {
      const timestamp = new Date().toLocaleTimeString("zh-TW", { hour12: false });
      log.textContent = `[${timestamp}] ${message}\n` + log.textContent;
    }

    function moveCardTo(zone) {
      zone.appendChild(dragCard);
    }

    function clearZoneState() {
      sourceZone.classList.remove("active");
      targetZone.classList.remove("active");
    }

    dragCard.addEventListener("dragstart", (event) => {
      dragCard.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", "drag-card");
      writeLog("dragstart: 開始拖曳卡片");
    });

    dragCard.addEventListener("drag", () => {
      writeLog("drag: 卡片正在移動");
    });

    dragCard.addEventListener("dragend", () => {
      dragCard.classList.remove("dragging");
      clearZoneState();
      writeLog("dragend: 拖曳結束");
    });

    [sourceZone, targetZone].forEach((zone) => {
      zone.addEventListener("dragenter", () => {
        zone.classList.add("active");
        writeLog(`dragenter: 進入 ${zone.id}`);
      });

      zone.addEventListener("dragover", (event) => {
        event.preventDefault();
        zone.classList.add("active");
      });

      zone.addEventListener("dragleave", () => {
        zone.classList.remove("active");
        writeLog(`dragleave: 離開 ${zone.id}`);
      });

      zone.addEventListener("drop", (event) => {
        event.preventDefault();
        const payload = event.dataTransfer.getData("text/plain");
        if (payload === "drag-card") {
          moveCardTo(zone);
          writeLog(`drop: 卡片已放入 ${zone.id}`);
        }
        zone.classList.remove("active");
      });
    });

    resetButton.addEventListener("click", () => {
      moveCardTo(sourceZone);
      clearZoneState();
      writeLog("reset: 卡片已回到拖曳來源");
    });

    writeLog("ready: 示例如已載入，可以開始拖曳");
  </script>
</body>
</html>
