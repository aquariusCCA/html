<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Accessibility checklist chart</title>
  <desc id="desc">A checklist chart showing semantic HTML, labels, alt text, keyboard access, and ARIA state.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect x="58" y="54" width="844" height="432" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="92" y="112" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">Accessibility checks</text>
  <g font-family="Arial, sans-serif" font-size="25" fill="#334155">
    <circle cx="118" cy="174" r="18" fill="#0f766e"/>
    <path d="M108 174l7 8 14-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="154" y="183">Semantic HTML first</text>
    <circle cx="118" cy="236" r="18" fill="#2563eb"/>
    <path d="M108 236l7 8 14-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="154" y="245">Useful alt text and labels</text>
    <circle cx="118" cy="298" r="18" fill="#b45309"/>
    <path d="M108 298l7 8 14-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="154" y="307">Keyboard navigation</text>
    <circle cx="118" cy="360" r="18" fill="#be123c"/>
    <path d="M108 360l7 8 14-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="154" y="369">ARIA state stays in sync</text>
  </g>
  <rect x="650" y="150" width="166" height="232" rx="12" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/>
  <circle cx="733" cy="226" r="44" fill="#99f6e4"/>
  <path d="M733 178v96M685 226h96" stroke="#0f766e" stroke-width="14" stroke-linecap="round"/>
  <text x="733" y="330" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#115e59" text-anchor="middle">A11y</text>
