<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>action 與 method 提交方向</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 440px;
    }

    code {
      background: #f2f2f2;
      padding: 2px 4px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>action 與 method 提交方向</h1>
  <p><code>action</code> 決定資料送到哪裡，<code>method</code> 決定用哪一種方式送出。</p>

  <form action="/search" method="get" name="searchForm">
    <label for="keyword">搜尋關鍵字</label>
    <input type="text" id="keyword" name="keyword" placeholder="輸入 HTML">

    <button type="submit">搜尋</button>
  </form>

  <p>觀察重點：這份表單準備把資料送到 <code>/search</code>，並使用 <code>get</code> 方法提交。</p>
</body>
</html>
