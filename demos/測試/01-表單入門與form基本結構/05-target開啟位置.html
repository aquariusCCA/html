<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>target 開啟位置</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 440px;
    }

    code {
      background: #f2f2f2;
      padding: 2px 4px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>target 開啟位置</h1>
  <p><code>target</code> 可以指定表單提交後的結果在哪裡開啟。</p>

  <form action="/preview" method="get" name="previewForm" target="_blank">
    <label for="title">預覽標題</label>
    <input type="text" id="title" name="title" placeholder="輸入標題">

    <button type="submit">在新分頁預覽</button>
  </form>

  <p>觀察重點：這份表單使用 <code>target="_blank"</code>，提交結果會嘗試在新分頁開啟。</p>
</body>
</html>
