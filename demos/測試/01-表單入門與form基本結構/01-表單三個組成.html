<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>表單三個組成</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 420px;
    }

    .hint {
      color: #555;
      font-size: 14px;
      margin-top: 0;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>表單三個組成</h1>
  <p>觀察表單域、表單控件與提示信息分別出現在什麼位置。</p>

  <!-- form 是表單域，包住這一組要送出的資料。 -->
  <form action="/contact" method="post" name="contactForm">
    <p class="hint">提示信息：請留下你的聯絡資料。</p>

    <label for="email">電子信箱</label>
    <input type="email" id="email" name="email" placeholder="name@example.com">

    <button type="submit">送出</button>
  </form>
</body>
</html>
