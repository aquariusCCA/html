<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>name 欄位名稱</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 440px;
    }

    .note {
      color: #555;
      font-size: 14px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>name 欄位名稱</h1>
  <p><code>name</code> 決定表單送出時，這個輸入值使用哪個欄位名稱。</p>

  <form action="/register" method="post" name="registerForm">
    <label for="username">帳號</label>
    <input type="text" id="username" name="username">
    <p class="note">這個欄位送出時的名稱是 <code>username</code>。</p>

    <label for="email">電子信箱</label>
    <input type="email" id="email" name="email">
    <p class="note">這個欄位送出時的名稱是 <code>email</code>。</p>

    <button type="submit">註冊</button>
  </form>
</body>
</html>
