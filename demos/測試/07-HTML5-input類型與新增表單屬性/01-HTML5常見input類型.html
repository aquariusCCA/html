<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>HTML5 常見 input 類型</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 500px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }

    .group {
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>HTML5 常見 input 類型</h1>
  <p>不同的 <code>type</code> 讓瀏覽器知道欄位用途，並提供更合適的輸入介面。</p>

  <form action="/profile" method="post" name="profileForm">
    <div class="group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email">
    </div>

    <div class="group">
      <label for="website">網址</label>
      <input type="url" id="website" name="website">
    </div>

    <div class="group">
      <label for="birthday">日期</label>
      <input type="date" id="birthday" name="birthday">
    </div>

    <div class="group">
      <label for="meeting-time">時間</label>
      <input type="time" id="meeting-time" name="meetingTime">
    </div>

    <div class="group">
      <label for="phone">手機號碼</label>
      <input type="tel" id="phone" name="phone">
    </div>

    <div class="group">
      <label for="theme-color">顏色</label>
      <input type="color" id="theme-color" name="themeColor">
    </div>

    <button type="submit">提交</button>
  </form>
</body>
</html>
