<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>常見錯誤對照</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    .example {
      border: 1px solid #aaa;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 500px;
    }

    .wrong {
      border-color: #b84a4a;
    }

    .right {
      border-color: #2f6f73;
    }

    label,
    input {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>常見錯誤對照</h1>
  <p>拼錯屬性或把 <code>placeholder</code> 當成正式標籤，都會降低表單可讀性與效果。</p>

  <section class="example wrong">
    <h2>錯誤寫法</h2>
    <p><code>autocommplete</code> 拼錯了，而且 Email 欄位只有提示文字，沒有正式 label。</p>

    <input type="search" name="keyword" autocommplete="off" placeholder="請輸入關鍵字">
    <input type="email" name="email" placeholder="Email">
  </section>

  <section class="example right">
    <h2>正確寫法</h2>
    <p><code>autocomplete</code> 要拼對；重要欄位應搭配 <code>&lt;label&gt;</code>。</p>

    <label for="keyword">搜尋</label>
    <input type="search" id="keyword" name="keyword" autocomplete="off" placeholder="請輸入關鍵字">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="請輸入 Email">
  </section>
</body>
</html>
