<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>placeholder 樣式</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 460px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }

    input::placeholder {
      color: #b84a8a;
    }
  </style>
</head>
<body>
  <h1>placeholder 樣式</h1>
  <p>可以用 <code>::placeholder</code> 調整提示文字樣式。</p>

  <form action="/account" method="post" name="accountForm">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="請輸入 Email">

    <label for="keyword">搜尋關鍵字</label>
    <input type="search" id="keyword" name="keyword" placeholder="輸入 HTML">

    <button type="submit">提交</button>
  </form>
</body>
</html>
