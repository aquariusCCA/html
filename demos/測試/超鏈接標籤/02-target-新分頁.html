<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>target 新分頁連結</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th,
    td {
      border: 1px solid #d8dde6;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f4f7fb;
    }
  </style>
</head>
<body>
  <h1>target 新分頁連結</h1>

  <p>
    <code>target</code> 用來指定連結開啟方式。
    內部導覽通常使用預設的 <code>_self</code>，
    外部網站才比較常考慮 <code>_blank</code>。
  </p>

  <table>
    <thead>
      <tr>
        <th>寫法</th>
        <th>示範連結</th>
        <th>觀察重點</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><code>target="_self"</code></td>
        <td><a href="https://example.com" target="_self">目前頁籤開啟</a></td>
        <td>這是預設行為，會在目前頁籤前往目標。</td>
      </tr>
      <tr>
        <td><code>target="_blank"</code></td>
        <td><a href="https://example.com" target="_blank" rel="noopener noreferrer">新頁籤開啟</a></td>
        <td>外部連結開新頁籤時，建議搭配 <code>rel</code>。</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
