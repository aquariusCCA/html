<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>href 基本連結</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .demo-box {
      border: 2px solid #d8dde6;
      padding: 16px;
      margin: 16px 0;
    }

    .note {
      background: #f4f7fb;
      padding: 12px;
    }
  </style>
</head>
<body>
  <h1>href 基本連結</h1>

  <p>
    <code>&lt;a&gt;</code> 的重點是建立「前往某個目標」的連結，
    <code>href</code> 用來指定目標地址。
  </p>

  <div class="demo-box">
    <h2>外部網站連結</h2>
    <p>
      <a href="https://example.com">前往 Example 網站</a>
    </p>
  </div>

  <div class="demo-box">
    <h2>內部頁面連結</h2>
    <p>
      <a href="./about.html">查看公司簡介</a>
    </p>
    <p class="note">
      這裡示範的是相對路徑。如果資料夾內沒有 <code>about.html</code>，
      點擊後會看到瀏覽器找不到檔案，這正好可以觀察路徑的影響。
    </p>
  </div>

  <div class="demo-box">
    <h2>沒有 href 的 a</h2>
    <p>
      <a>只有文字，沒有連結目標</a>
    </p>
    <p class="note">
      這個 <code>&lt;a&gt;</code> 沒有 <code>href</code>，
      因此不是一個完整可前往目標的超連結。
    </p>
  </div>
</body>
</html>
