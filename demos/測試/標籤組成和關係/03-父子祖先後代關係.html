<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>父子祖先後代關係</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px;
    }

    main,
    section,
    ul,
    li {
      border: 2px solid #d8dde6;
      padding: 10px;
      margin: 10px;
    }

    main {
      border-color: #637a9f;
    }

    section {
      border-color: #739072;
    }

    ul {
      border-color: #d8a25e;
    }

    li {
      border-color: #b85c5c;
    }

    main::before {
      content: "main：祖先元素";
      font-weight: 700;
    }

    section::before {
      content: "section：祖先元素";
      font-weight: 700;
    }

    ul::before {
      content: "ul：父元素";
      font-weight: 700;
    }

    .legend {
      background: #f4f7fb;
      padding: 12px;
    }
  </style>
</head>
<body>
  <h1>父子、祖先與後代關係</h1>

  <p>
    元素被另一個元素直接包住時，就是父子關係。
    外層所有包住它的元素，則是祖先元素。
  </p>

  <p class="legend">
    觀察 <code>&lt;li&gt;CSS&lt;/li&gt;</code>：
    <code>&lt;ul&gt;</code> 是父元素，
    <code>&lt;section&gt;</code> 和 <code>&lt;main&gt;</code> 是祖先元素。
  </p>

  <main>
    <section>
      <h2>前端學習順序</h2>
      <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
      </ul>
    </section>
  </main>
</body>
</html>
