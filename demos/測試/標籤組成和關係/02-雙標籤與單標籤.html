<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>雙標籤與單標籤</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .demo {
      border: 2px solid #d8dde6;
      padding: 16px;
    }

    pre {
      background: #f4f7fb;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>雙標籤與單標籤</h1>

  <p>
    判斷一個標籤是雙標籤還是單標籤，重點是它需不需要包住內容。
  </p>

  <div class="grid">
    <section class="demo">
      <h2>雙標籤</h2>
      <p>雙標籤會包住文字或其他元素。</p>
      <pre><code>&lt;h2&gt;網頁標題&lt;/h2&gt;
&lt;p&gt;這是一段說明文字。&lt;/p&gt;</code></pre>

      <h2>網頁標題</h2>
      <p>這是一段說明文字。</p>
    </section>

    <section class="demo">
      <h2>單標籤</h2>
      <p>單標籤本身就能表達功能，不包住內容。</p>
      <pre><code>&lt;img src="photo.jpg" alt="範例照片"&gt;
&lt;br&gt;
&lt;input type="text" name="username"&gt;</code></pre>

      <p>姓名：<input type="text" name="username" placeholder="請輸入姓名"></p>
      <p>這行文字後面有換行。<br>這是換行後的文字。</p>
    </section>
  </div>
</body>
</html>
