<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>兄弟與並列關係</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 16px;
      border: 2px solid #637a9f;
      list-style: none;
    }

    .sibling {
      flex: 1 1 160px;
      border: 2px solid #b85c5c;
      padding: 12px;
      background: #fff8f8;
    }

    pre {
      background: #f4f7fb;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>兄弟與並列關係</h1>

  <p>
    兄弟元素有同一個父元素，並且位在同一層。
    下面三個 <code>&lt;li&gt;</code> 都直接放在同一個 <code>&lt;ul&gt;</code> 裡。
  </p>

  <pre><code>&lt;ul&gt;
  &lt;li&gt;HTML&lt;/li&gt;
  &lt;li&gt;CSS&lt;/li&gt;
  &lt;li&gt;JavaScript&lt;/li&gt;
&lt;/ul&gt;</code></pre>

  <ul class="row" aria-label="ul 父元素示意">
    <li class="sibling">li：HTML</li>
    <li class="sibling">li：CSS</li>
    <li class="sibling">li：JavaScript</li>
  </ul>

  <p>
    寫 HTML 時，如果多個元素縮排相同，而且被同一個父元素包住，
    通常就可以把它們視為同一層的兄弟元素。
  </p>
</body>
</html>
