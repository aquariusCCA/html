<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>標籤基本組成</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .part-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .part {
      border: 2px solid #d8dde6;
      padding: 12px;
    }

    code {
      background: #f4f7fb;
      padding: 2px 5px;
    }
  </style>
</head>
<body>
  <h1>標籤基本組成</h1>

  <p>
    一個雙標籤通常由起始標籤、內容與結束標籤組成。
    先看這個段落元素：
  </p>

  <p><code>&lt;p&gt;這是一段文字。&lt;/p&gt;</code></p>

  <div class="part-list">
    <div class="part">
      <strong><code>&lt;p&gt;</code> 起始標籤</strong>
      <p>表示段落內容從這裡開始。</p>
    </div>

    <div class="part">
      <strong><code>p</code> 標籤名</strong>
      <p>代表 paragraph，也就是段落。</p>
    </div>

    <div class="part">
      <strong>這是一段文字。</strong>
      <p>這是元素內容，會顯示在頁面上。</p>
    </div>

    <div class="part">
      <strong><code>&lt;/p&gt;</code> 結束標籤</strong>
      <p>表示段落內容到這裡結束。</p>
    </div>
  </div>
</body>
</html>
