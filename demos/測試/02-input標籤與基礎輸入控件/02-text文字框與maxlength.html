<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>text 文字框與 maxlength</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 440px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }

    .note {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>text 文字框與 maxlength</h1>
  <p><code>type="text"</code> 適合輸入單行短文字，<code>maxlength</code> 可以限制最大字元數。</p>

  <form action="/register" method="post" name="textInputForm">
    <label for="nickname">暱稱</label>
    <input
      type="text"
      id="nickname"
      name="nickname"
      placeholder="最多 12 個字"
      maxlength="12"
    >

    <button type="submit">送出</button>
  </form>

  <p class="note">觀察重點：輸入超過 12 個字時，瀏覽器會阻止更多字元進入欄位。</p>
</body>
</html>
