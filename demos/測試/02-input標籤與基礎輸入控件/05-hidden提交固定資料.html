<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>hidden 提交固定資料</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 460px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }

    .note {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>hidden 提交固定資料</h1>
  <p><code>type="hidden"</code> 不會顯示在畫面上，但會跟著表單一起提交。</p>

  <form action="/article/comment" method="post" name="commentForm">
    <input type="hidden" name="articleId" value="100">

    <label for="comment">留言</label>
    <input type="text" id="comment" name="comment" placeholder="輸入留言">

    <button type="submit">送出留言</button>
  </form>

  <p class="note">觀察重點：畫面只看得到留言欄位，但程式碼中還有一個會提交的 <code>articleId=100</code>。</p>
</body>
</html>
