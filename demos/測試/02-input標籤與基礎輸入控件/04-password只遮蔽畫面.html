<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>password 只遮蔽畫面</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 440px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }

    .warning {
      color: #8a3a00;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>password 只遮蔽畫面</h1>
  <p><code>type="password"</code> 會遮蔽畫面上的輸入內容，適合密碼欄位。</p>

  <form action="/login" method="post" name="loginForm">
    <label for="password">密碼</label>
    <input
      type="password"
      id="password"
      name="password"
      placeholder="請輸入密碼"
      maxlength="30"
    >

    <button type="submit">登入</button>
  </form>

  <p class="warning">觀察重點：密碼框只負責畫面遮蔽，不代表資料已經被安全加密。</p>
</body>
</html>
