<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>option 的 value 與 selected</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 460px;
    }

    label,
    select,
    button {
      display: block;
      margin-top: 8px;
    }

    .note {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>option 的 value 與 selected</h1>
  <p><code>value</code> 是選項提交出去的資料值，<code>selected</code> 是預設選取。</p>

  <form action="/profile" method="post" name="cityForm">
    <label for="city">居住地</label>
    <select id="city" name="city">
      <option value="hlj">黑龍江</option>
      <option value="ln">遼寧</option>
      <option value="jl">吉林</option>
      <option value="gd" selected>廣東</option>
    </select>

    <button type="submit">儲存</button>
  </form>

  <p class="note">觀察重點：畫面顯示「廣東」，但提交值是 <code>gd</code>。</p>
</body>
</html>
