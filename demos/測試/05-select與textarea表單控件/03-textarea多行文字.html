<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>textarea 多行文字</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 460px;
    }

    label,
    textarea,
    button {
      display: block;
      margin-top: 8px;
    }

    .note {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>textarea 多行文字</h1>
  <p><code>&lt;textarea&gt;</code> 適合留言、評論、地址補充等較長內容。</p>

  <form action="/comment" method="post" name="commentForm">
    <label for="message">留言內容</label>
    <textarea id="message" name="message" rows="5" cols="30">預設文字</textarea>

    <button type="submit">送出留言</button>
  </form>

  <p class="note">觀察重點：<code>rows</code> 影響高度，<code>cols</code> 影響寬度，標籤中間的文字是預設內容。</p>
</body>
</html>
