<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>select 建立下拉列表</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 440px;
    }

    label,
    select,
    button {
      display: block;
      margin-top: 8px;
    }

    .note {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>select 建立下拉列表</h1>
  <p><code>&lt;select&gt;</code> 用來建立下拉列表，裡面至少要有一個 <code>&lt;option&gt;</code>。</p>

  <form action="/profile" method="post" name="profileForm">
    <label for="city">居住地</label>
    <select id="city" name="city">
      <option value="hlj">黑龍江</option>
      <option value="ln">遼寧</option>
      <option value="jl">吉林</option>
      <option value="gd">廣東</option>
    </select>

    <button type="submit">儲存</button>
  </form>

  <p class="note">觀察重點：<code>name="city"</code> 是提交資料時的欄位名稱。</p>
</body>
</html>
