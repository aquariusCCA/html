<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>label for 與 id 關聯</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    .example {
      border: 1px solid #aaa;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 480px;
    }

    .wrong {
      border-color: #b84a4a;
    }

    .right {
      border-color: #2f6f73;
    }

    label,
    input {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>label for 與 id 關聯</h1>
  <p><code>&lt;label&gt;</code> 的 <code>for</code> 要對應控件的 <code>id</code>，點擊文字才會聚焦欄位。</p>

  <section class="example wrong">
    <h2>錯誤寫法</h2>
    <p><code>for="user"</code> 對不到 <code>id="username"</code>，點擊文字不會正確聚焦。</p>

    <input type="text" id="username" name="username">
    <label for="user">使用者名稱</label>
  </section>

  <section class="example right">
    <h2>正確寫法</h2>
    <p><code>for="account"</code> 對應 <code>id="account"</code>，文字與輸入框建立關聯。</p>

    <input type="text" id="account" name="account">
    <label for="account">帳戶名稱</label>
  </section>
</body>
</html>
