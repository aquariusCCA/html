<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>disabled 禁用單個控件</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 460px;
    }

    label,
    input,
    select,
    button {
      display: block;
      margin-top: 8px;
    }

    .note {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>disabled 禁用單個控件</h1>
  <p>加上 <code>disabled</code> 的控件會暫時不能操作。</p>

  <form action="/settings" method="post" name="settingsForm">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="user@example.com" disabled>

    <label for="plan">方案</label>
    <select id="plan" name="plan" disabled>
      <option value="basic">基本方案</option>
      <option value="pro">專業方案</option>
    </select>

    <button type="button" disabled>取得驗證碼</button>
  </form>

  <p class="note">觀察重點：被禁用的輸入框、下拉列表與按鈕都不能操作。</p>
</body>
</html>
