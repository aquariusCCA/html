<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>fieldset disabled 與提交注意</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    .example {
      border: 1px solid #aaa;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 500px;
    }

    .wrong {
      border-color: #b84a4a;
    }

    .right {
      border-color: #2f6f73;
    }

    fieldset {
      margin-top: 8px;
      padding: 12px;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>fieldset disabled 與提交注意</h1>
  <p><code>&lt;fieldset disabled&gt;</code> 可以一次禁用整組控件；被禁用的控件不會提交資料。</p>

  <section class="example wrong">
    <h2>錯誤寫法</h2>
    <p>如果 Email 仍需要提交，就不應該把它放在禁用區域中。</p>

    <form action="/settings" method="post" name="wrongSettingsForm">
      <fieldset disabled>
        <legend>暫停編輯的資料</legend>

        <label for="wrong-email">Email</label>
        <input type="email" id="wrong-email" name="email" value="user@example.com">

        <button type="button">取得驗證碼</button>
      </fieldset>
    </form>
  </section>

  <section class="example right">
    <h2>正確寫法</h2>
    <p>需要提交的 Email 保持可用；只有不該操作的按鈕才禁用。</p>

    <form action="/settings" method="post" name="rightSettingsForm">
      <label for="right-email">Email</label>
      <input type="email" id="right-email" name="email" value="user@example.com">

      <button type="button" disabled>暫停取得驗證碼</button>
      <button type="submit">儲存設定</button>
    </form>
  </section>
</body>
</html>
