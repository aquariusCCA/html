<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>fieldset 與 legend 分組</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      max-width: 480px;
    }

    fieldset {
      border: 2px solid #2f6f73;
      margin-bottom: 16px;
      padding: 16px;
    }

    legend {
      font-weight: bold;
    }

    label,
    input {
      display: block;
      margin-top: 8px;
    }

    button {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>fieldset 與 legend 分組</h1>
  <p><code>&lt;fieldset&gt;</code> 包住一組相關欄位，<code>&lt;legend&gt;</code> 是這組欄位的標題。</p>

  <form action="/account" method="post" name="accountForm">
    <fieldset>
      <legend>主要信息</legend>

      <label for="account">帳戶</label>
      <input type="text" id="account" name="account" maxlength="10">

      <label for="password">密碼</label>
      <input type="password" id="password" name="password" maxlength="6">
    </fieldset>

    <fieldset>
      <legend>勾選區域</legend>

      <label>
        <input type="radio" name="gender" value="woman">
        女
      </label>

      <label>
        <input type="radio" name="gender" value="man">
        男
      </label>
    </fieldset>

    <button type="submit">提交</button>
  </form>
</body>
</html>
