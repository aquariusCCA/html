<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>button 忘記 type 的錯誤</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    .example {
      border: 1px solid #aaa;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 460px;
    }

    .wrong {
      border-color: #b84a4a;
    }

    .right {
      border-color: #2f6f73;
    }

    label,
    input,
    button {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>button 忘記 type 的錯誤</h1>
  <p>在表單裡，<code>&lt;button&gt;</code> 沒寫 <code>type</code> 時，預設行為是提交表單。</p>

  <section class="example wrong">
    <h2>錯誤寫法</h2>
    <p>使用者只是想取得驗證碼，但這顆按鈕可能會意外提交表單。</p>

    <form action="/login" method="post" name="wrongLoginForm">
      <label for="wrong-phone">手機號碼</label>
      <input type="text" id="wrong-phone" name="phone">

      <button>取得簡訊驗證碼</button>
    </form>
  </section>

  <section class="example right">
    <h2>正確寫法</h2>
    <p>一般操作按鈕要明確寫成 <code>type="button"</code>。</p>

    <form action="/login" method="post" name="rightLoginForm">
      <label for="right-phone">手機號碼</label>
      <input type="text" id="right-phone" name="phone">

      <button type="button">取得簡訊驗證碼</button>
      <button type="submit">登入</button>
    </form>
  </section>
</body>
</html>
