<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>checkbox 可複選</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 440px;
    }

    label {
      display: block;
      margin-top: 8px;
    }

    button {
      display: block;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>checkbox 可複選</h1>
  <p><code>type="checkbox"</code> 適合可以選零個、一個或多個的情境。</p>

  <form action="/settings" method="post" name="settingsForm">
    <p>想訂閱的內容</p>

    <label>
      <input type="checkbox" name="topics" value="html" checked>
      HTML
    </label>

    <label>
      <input type="checkbox" name="topics" value="css">
      CSS
    </label>

    <label>
      <input type="checkbox" name="topics" value="javascript">
      JavaScript
    </label>

    <button type="submit">儲存設定</button>
  </form>
</body>
</html>
