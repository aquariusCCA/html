<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>radio 相同 name 才同組</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    .example {
      border: 1px solid #aaa;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 460px;
    }

    .wrong {
      border-color: #b84a4a;
    }

    .right {
      border-color: #2f6f73;
    }

    label {
      display: block;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>radio 相同 name 才同組</h1>
  <p>同一組 radio 必須使用相同的 <code>name</code>，才會形成多選一。</p>

  <section class="example wrong">
    <h2>錯誤寫法</h2>
    <p>兩個 radio 使用不同 <code>name</code>，不會互斥，可能同時被選取。</p>

    <label>
      <input type="radio" name="genderFemale" value="female">
      女
    </label>

    <label>
      <input type="radio" name="genderMale" value="male">
      男
    </label>
  </section>

  <section class="example right">
    <h2>正確寫法</h2>
    <p>同一組選項使用相同 <code>name="gender"</code>，使用者只能選一個。</p>

    <label>
      <input type="radio" name="gender" value="female">
      女
    </label>

    <label>
      <input type="radio" name="gender" value="male">
      男
    </label>
  </section>
</body>
</html>
