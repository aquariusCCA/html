<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>radio 多選一</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    form {
      border: 2px solid #2f6f73;
      padding: 16px;
      max-width: 420px;
    }

    label {
      display: block;
      margin-top: 8px;
    }

    button {
      display: block;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>radio 多選一</h1>
  <p><code>type="radio"</code> 適合只能選一個答案的情境。</p>

  <form action="/profile" method="post" name="profileForm">
    <p>性別</p>

    <!-- 同一組 radio 使用相同 name，才會互斥。 -->
    <label>
      <input type="radio" name="gender" value="female">
      女
    </label>

    <label>
      <input type="radio" name="gender" value="male">
      男
    </label>

    <label>
      <input type="radio" name="gender" value="other" checked>
      其他
    </label>

    <button type="submit">儲存</button>
  </form>
</body>
</html>
