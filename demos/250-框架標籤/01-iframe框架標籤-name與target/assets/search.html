<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搜尋結果</title>
  <style>
    body { margin: 0; font-family: system-ui, "Microsoft JhengHei", sans-serif; color: #1f2933; }
    .wrap { padding: 22px 24px; background: linear-gradient(135deg, #d1fae5, #ecfdf5); min-height: 100%; }
    h1 { margin: 0 0 8px; color: #047857; font-size: 20px; }
    p { line-height: 1.7; }
    .kw { font-weight: 700; color: #047857; }
    .empty { color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔎 搜尋結果</h1>
    <p id="result" class="empty">尚未收到關鍵字。</p>
    <p>這個頁面是表單 <code>action</code> 指向的本機示範頁，表單因 <code>target="container"</code> 而把結果顯示在框架中。</p>
  </div>
  <script>
    // 讀取表單以 GET 送出的查詢字串，顯示使用者輸入的關鍵字
    var params = new URLSearchParams(window.location.search);
    var keyword = params.get("keyword");
    var el = document.getElementById("result");
    if (keyword) {
      el.className = "";
      el.innerHTML = '你搜尋的關鍵字是：<span class="kw"></span>';
      el.querySelector(".kw").textContent = keyword;
    }
  </script>
</body>
</html>
