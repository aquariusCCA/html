<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首頁</title>
  <style>
    body { margin: 0; font-family: system-ui, "Microsoft JhengHei", sans-serif; color: #1f2933; }
    .wrap { padding: 22px 24px; background: linear-gradient(135deg, #e0f2fe, #f0f9ff); min-height: 100%; }
    h1 { margin: 0 0 8px; color: #0369a1; font-size: 20px; }
    p { line-height: 1.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🏠 首頁</h1>
    <p>這是載入到 iframe 內的「首頁」內容。</p>
    <p>當你點擊左側 <code>target="container"</code> 的連結時，對應頁面就會出現在這個框架裡。</p>
  </div>
</body>
</html>
