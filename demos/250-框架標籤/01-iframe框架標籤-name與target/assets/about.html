<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>關於我們</title>
  <style>
    body { margin: 0; font-family: system-ui, "Microsoft JhengHei", sans-serif; color: #1f2933; }
    .wrap { padding: 22px 24px; background: linear-gradient(135deg, #ede9fe, #f5f3ff); min-height: 100%; }
    h1 { margin: 0 0 8px; color: #6d28d9; font-size: 20px; }
    p { line-height: 1.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ℹ️ 關於我們</h1>
    <p>這是「關於我們」頁面，同樣被載入到 <code>name="container"</code> 的 iframe 中。</p>
    <p>三個連結指向不同頁面，但都顯示在同一個框架，這就是 target 導向的效果。</p>
  </div>
</body>
</html>
