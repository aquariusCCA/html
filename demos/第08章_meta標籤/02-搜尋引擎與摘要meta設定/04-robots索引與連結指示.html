<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="示範 robots meta 如何提供索引與連結跟隨指示。">
  <title>robots 索引與連結指示</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
      color: #222;
    }

    section {
      margin-block: 1.5rem;
    }

    .choice {
      border: 2px solid #8a8a8a;
      padding: 1rem;
      margin-block: 1rem;
      background: #fafafa;
    }

    .choice strong {
      display: block;
      margin-bottom: 0.5rem;
    }

    pre {
      background: #f6f6f6;
      padding: 1rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>robots 索引與連結指示</h1>

  <!-- 觀察重點：robots 可以組合 index/noindex 與 follow/nofollow。 -->

  <section>
    <h2>公開頁面常見情況</h2>
    <div class="choice">
      <strong>沒有特別限制</strong>
      <pre><code>&lt;head&gt;
  &lt;meta name="description" content="用一句精準文字描述這個頁面的內容。"&gt;
  &lt;title&gt;公開教學頁面&lt;/title&gt;
&lt;/head&gt;</code></pre>
      <p>公開頁面通常可以省略 <code>robots</code>，不需要特別寫 <code>index, follow</code>。</p>
    </div>
  </section>

  <section>
    <h2>不希望被索引或跟隨連結</h2>
    <div class="choice">
      <strong>內部測試頁範例</strong>
      <pre><code>&lt;meta name="robots" content="noindex, nofollow"&gt;</code></pre>
      <p><code>noindex</code> 表示要求不要索引這個頁面。</p>
      <p><code>nofollow</code> 表示要求不要跟隨頁面上的連結。</p>
    </div>
  </section>
</body>
</html>
