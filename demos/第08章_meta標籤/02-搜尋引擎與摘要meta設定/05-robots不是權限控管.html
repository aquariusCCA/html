<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="說明 robots meta 是爬蟲指示，不是保護私密內容的權限控管。">
  <title>robots 不是權限控管</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
      color: #222;
    }

    section {
      margin-block: 1.5rem;
    }

    .wrong {
      border-left: 6px solid #b33a3a;
      padding: 0.5rem 1rem;
      background: #fff5f5;
      margin-block: 1rem;
    }

    .correct {
      border-left: 6px solid #2f7d46;
      padding: 0.5rem 1rem;
      background: #f3faf4;
      margin-block: 1rem;
    }

    pre {
      background: #f6f6f6;
      padding: 1rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>robots 不是權限控管</h1>

  <!-- 觀察重點：robots 是給搜尋爬蟲的指示，不是限制外部存取的安全機制。 -->

  <section>
    <h2>錯誤寫法</h2>
    <div class="wrong">
      <p>錯誤寫法：以為只要加入 <code>noindex</code>，私密內容就安全了。</p>
      <pre><code>&lt;meta name="robots" content="noindex"&gt;</code></pre>
      <p>這只是在要求搜尋爬蟲不要索引頁面，不能阻止其他人開啟網址。</p>
    </div>
  </section>

  <section>
    <h2>正確判斷</h2>
    <div class="correct">
      <p>如果內容不能被外部看到，應該使用登入、權限、伺服器設定或其他安全機制。</p>
      <p><code>robots</code> 可以輔助搜尋呈現規則，但不能取代真正的存取控制。</p>
    </div>
  </section>
</body>
</html>
