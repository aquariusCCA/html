<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="用初學者能理解的方式介紹 HTML meta 標籤。">
  <title>description 摘要候選文字</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
      color: #222;
    }

    section {
      margin-block: 1.5rem;
    }

    .preview {
      border: 2px solid #8a8a8a;
      padding: 1rem;
      max-width: 42rem;
      background: #fafafa;
    }

    .preview-title {
      color: #1a0dab;
      font-size: 1.2rem;
      margin: 0;
    }

    .preview-url {
      color: #16753a;
      margin: 0.25rem 0;
    }

    .preview-summary {
      margin: 0;
    }

    pre {
      background: #f6f6f6;
      padding: 1rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>description 摘要候選文字</h1>

  <!-- 觀察重點：description 放在 head 中，用來提供頁面摘要的候選文字。 -->

  <section>
    <h2>head 中的設定</h2>
    <pre><code>&lt;head&gt;
  &lt;meta name="description" content="用初學者能理解的方式介紹 HTML meta 標籤。"&gt;
  &lt;title&gt;HTML meta 標籤入門&lt;/title&gt;
&lt;/head&gt;</code></pre>
  </section>

  <section>
    <h2>搜尋結果摘要預覽</h2>
    <div class="preview">
      <p class="preview-title">HTML meta 標籤入門</p>
      <p class="preview-url">example.com/html-meta</p>
      <p class="preview-summary">用初學者能理解的方式介紹 HTML meta 標籤。</p>
    </div>
    <p>這個區塊只是模擬畫面，實際搜尋引擎可能依查詢與頁面內容改寫摘要。</p>
  </section>
</body>
</html>
