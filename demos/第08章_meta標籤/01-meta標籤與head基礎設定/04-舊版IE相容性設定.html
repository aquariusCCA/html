<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>舊版 IE 相容性設定</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
      color: #222;
    }

    section {
      margin-block: 1.5rem;
    }

    .note {
      border-left: 6px solid #6d6d6d;
      background: #f5f5f5;
      padding: 1rem;
    }

    pre {
      background: #f6f6f6;
      padding: 1rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>舊版 IE 相容性設定</h1>

  <!-- 觀察重點：X-UA-Compatible 是舊版 Internet Explorer 的歷史相容性設定。 -->

  <section>
    <h2>觀察範例</h2>
    <pre><code>&lt;meta http-equiv="X-UA-Compatible" content="IE=edge"&gt;</code></pre>

    <div class="note">
      <p>這行設定要求舊版 Internet Explorer 使用可用的最高文件模式渲染頁面。</p>
      <p>現代瀏覽器通常會忽略這段設定。</p>
    </div>
  </section>

  <section>
    <h2>建議修改任務</h2>
    <p>如果你的練習頁不需要支援舊版 IE，可以移除這行，保留 <code>charset</code>、<code>viewport</code> 與 <code>title</code>。</p>
  </section>
</body>
</html>
