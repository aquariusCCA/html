<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>標題層級常見錯誤 Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="page-header">
    <p class="eyebrow">Demo 03</p>
    <h1>比較錯誤與修正後的標題結構</h1>
    <p>
      這個 demo 將層級亂跳、普通文字誤用標題的情況放在左側，
      再用右側範例示範較清楚的修正方式。
    </p>
  </header>

  <main>
    <section class="sample-grid" aria-label="錯誤與修正範例">
      <article class="sample-card mistake" data-heading-sample="錯誤範例">
        <p class="sample-label">錯誤範例</p>
        <h1>商品介紹</h1>
        <h4>特色</h4>
        <p>這裡介紹商品特色。</p>
        <h3 data-warning="這句只是促銷文字，不是新的內容章節。">限時優惠中</h3>
        <p>本週下單可享免運。</p>
        <h2>使用方式</h2>
        <p>接上電源後按下開關即可使用。</p>
      </article>

      <article class="sample-card correction" data-heading-sample="修正範例">
        <p class="sample-label">修正範例</p>
        <h1>商品介紹</h1>
        <h2>特色</h2>
        <p>這裡介紹商品特色。</p>
        <p class="promo-text">限時優惠中</p>
        <p>本週下單可享免運。</p>
        <h2>使用方式</h2>
        <p>接上電源後按下開關即可使用。</p>
      </article>
    </section>

    <section class="demo-section" aria-labelledby="analysis-title">
      <h2 id="analysis-title">JavaScript 讀到的標題順序</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>範例</th>
              <th>標籤</th>
              <th>標題文字</th>
              <th>檢查結果</th>
            </tr>
          </thead>
          <tbody data-heading-analysis></tbody>
        </table>
      </div>
      <p class="note">
        觀察重點：標題層級應該反映內容關係。若從 <code>h1</code> 直接跳到 <code>h4</code>，
        讀者與輔助工具較難理解中間層級。
      </p>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
