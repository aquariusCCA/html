<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>p 段落不能包含區塊內容</title>
  <style>
    body {
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #b8c2cc;
      border-radius: 8px;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    .paragraph-probe {
      outline: 2px solid #805ad5;
      background: #faf5ff;
      padding: 8px;
    }

    .block-probe {
      outline: 2px dashed #dd6b20;
      background: #fffaf0;
      padding: 8px;
      margin: 8px 0;
    }

    code {
      background: #edf2f7;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>p 段落不能包含區塊內容</h1>

  <!-- 觀察重點：p 適合段落文字與 phrasing content，不應該包 div。 -->

  <section>
    <h2>錯誤與正確對照</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <p>下面刻意把 <code>div</code> 放進 <code>p</code> 中。</p>

        <p class="paragraph-probe">
          段落開頭文字
          <div class="block-probe">被塞進 p 的 div</div>
          段落結尾文字
        </p>

        <p>開啟開發者工具觀察：瀏覽器通常會在 div 出現前自動結束 p。</p>
      </div>

      <div class="example correct">
        <h3>正確寫法</h3>

        <p class="paragraph-probe">這是一段段落文字。</p>
        <div class="block-probe">這是一個獨立區塊。</div>

        <p class="paragraph-probe">
          如果只是標記段落中的一小段文字，可以使用 <span>span</span>。
        </p>
      </div>
    </div>
  </section>
</body>
</html>
