<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>標題元素不可互相巢狀</title>
  <style>
    body {
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #b8c2cc;
      border-radius: 8px;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    .hint {
      color: #4a5568;
    }
  </style>
</head>
<body>
  <h1>標題元素不可互相巢狀</h1>

  <!-- 觀察重點：h1 到 h6 表示標題層級，不是用來包住下一層標題的容器。 -->

  <section>
    <h2>錯誤與正確對照</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>

        <h1>
          第一層標題
          <h2>第二層標題</h2>
        </h1>

        <p class="hint">瀏覽器可能會自動關閉或重組標題標籤。</p>
      </div>

      <div class="example correct">
        <h3>正確寫法</h3>

        <h1>第一層標題</h1>
        <h2>第二層標題</h2>

        <p class="hint">兩個標題平行排列，用層級表達章節關係。</p>
      </div>
    </div>
  </section>
</body>
</html>
