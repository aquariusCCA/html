<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Void Elements 不能包內容</title>
  <style>
    body {
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #b8c2cc;
      border-radius: 8px;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    code {
      background: #edf2f7;
      padding: 2px 4px;
    }

    label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
  </style>
</head>
<body>
  <h1>Void Elements 不能包內容</h1>

  <!-- 觀察重點：input 是 void element，本身不能再包 span 或文字。 -->

  <section>
    <h2>錯誤與正確對照</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <p><code>input</code> 不能把提示文字包在自己裡面。</p>

        <input type="text">
          <span>提示文字</span>
        </input>

        <p>開啟開發者工具觀察：提示文字不會成為 input 的子元素。</p>
      </div>

      <div class="example correct">
        <h3>正確寫法</h3>
        <p>需要提示文字時，可以把文字和輸入框放在 <code>label</code> 中。</p>

        <label>
          姓名
          <input type="text" name="username">
        </label>
      </div>
    </div>
  </section>
</body>
</html>
