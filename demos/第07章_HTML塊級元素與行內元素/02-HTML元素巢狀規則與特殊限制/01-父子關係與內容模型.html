<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>父子關係與內容模型</title>
  <style>
    body {
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .example {
      border: 1px solid #b8c2cc;
      border-radius: 8px;
      padding: 16px;
      margin-block: 12px;
    }

    .parent {
      border: 3px solid #2b6cb0;
      padding: 16px;
      background: #eef6ff;
    }

    .child {
      border: 2px dashed #4a5568;
      padding: 8px;
      margin: 8px;
      display: inline-block;
      background: #fff;
    }

    .block-child {
      display: block;
    }

    .note {
      border-left: 4px solid #2f855a;
      padding-left: 12px;
      color: #22543d;
    }
  </style>
</head>
<body>
  <h1>父子關係與內容模型</h1>

  <!-- 觀察重點：外層元素包住內層元素時，形成父元素與子元素。 -->

  <section>
    <h2>觀察範例</h2>
    <div class="example">
      <p>藍色外框是父元素，虛線外框是它的子元素。</p>

      <div class="parent">
        外層 div：父元素
        <span class="child">span 子元素</span>
        <input class="child" type="text" value="input 子元素">
        <div class="child block-child">內層 div 子元素</div>
      </div>
    </div>
  </section>

  <section>
    <h2>判斷巢狀時先問什麼</h2>
    <ul>
      <li>外層元素的語意是什麼？</li>
      <li>外層元素允許哪些子內容？</li>
      <li>內層元素本身可不可以有子內容？</li>
    </ul>

    <p class="note">
      巢狀規則不是只看「塊級」或「行內」，而是要看元素自己的內容模型。
    </p>
  </section>
</body>
</html>
