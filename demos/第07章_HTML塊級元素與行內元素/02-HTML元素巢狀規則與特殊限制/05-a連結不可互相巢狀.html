<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>a 連結不可互相巢狀</title>
  <style>
    body {
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #b8c2cc;
      border-radius: 8px;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    a {
      color: #2b6cb0;
    }

    .card-link {
      display: block;
      border: 2px solid #2b6cb0;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      text-decoration: none;
    }

    .card-link div {
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>a 連結不可互相巢狀</h1>

  <!-- 觀察重點：a 可以包所在位置允許的內容，但不能再包另一個 a。 -->

  <section>
    <h2>錯誤與正確對照</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>

        <a href="https://example.com">
          前往首頁
          <a href="https://example.com/profile">查看個人頁</a>
        </a>

        <p>兩個可點擊目標不應該互相包住。</p>
      </div>

      <div class="example correct">
        <h3>正確寫法</h3>

        <p>
          <a href="https://example.com">前往首頁</a>
        </p>
        <p>
          <a href="https://example.com/profile">查看個人頁</a>
        </p>

        <article>
          <a class="card-link" href="https://example.com/article">
            文章標題
            <div>這是一個放在 a 裡的區塊內容。</div>
          </a>
        </article>
      </div>
    </div>
  </section>
</body>
</html>
