<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Demo 02：寬高設定比較</title>
  <style>
    body {
      max-width: 760px;
      margin: 24px auto;
      font-family: "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
    }

    .stage {
      border: 2px solid #888;
      padding: 16px;
      margin: 16px 0 28px;
      background: #fafafa;
    }

    .block-box {
      width: 220px;
      height: 64px;
      padding: 8px;
      background: #d9ecff;
      border: 2px solid #4c83b8;
    }

    .inline-box {
      width: 220px;
      height: 64px;
      background: #ffe5b4;
      border: 2px solid #c47a1f;
    }
  </style>
</head>
<body>
  <h1>Demo 02：寬高設定比較</h1>

  <!-- 觀察重點：width 與 height 對塊級元素通常有效；對一般非置換行內元素通常不會產生預期效果。 -->

  <section>
    <h2>塊級元素設定 width / height</h2>
    <div class="stage">
      <div class="block-box">div：設定 width: 220px; height: 64px;</div>
    </div>
  </section>

  <section>
    <h2>一般行內元素設定 width / height</h2>
    <p class="stage">
      前面文字
      <span class="inline-box">span：也設定 width: 220px; height: 64px;</span>
      後面文字
    </p>
  </section>
</body>
</html>
