<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Demo 03：間距效果比較</title>
  <style>
    body {
      max-width: 760px;
      margin: 24px auto;
      font-family: "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
    }

    .stage {
      border: 2px solid #888;
      padding: 16px;
      margin: 16px 0 28px;
      background: #fafafa;
    }

    .block-item {
      margin: 18px 30px;
      padding: 14px;
      background: #d9ecff;
      border: 2px solid #4c83b8;
    }

    .inline-lines {
      line-height: 1.8;
    }

    .inline-chip {
      margin: 18px 30px;
      padding: 14px;
      background: #ffe5b4;
      border: 2px solid #c47a1f;
    }
  </style>
</head>
<body>
  <h1>Demo 03：間距效果比較</h1>

  <!-- 觀察重點：塊級元素的 margin / padding 上下左右都容易觀察；行內元素左右方向較直覺，上下方向對版面推擠較有限。 -->

  <section>
    <h2>塊級元素的 margin / padding</h2>
    <div class="stage">
      <div class="block-item">第一個 div：有 margin 與 padding。</div>
      <div class="block-item">第二個 div：上下左右間距都會影響區塊排列。</div>
    </div>
  </section>

  <section>
    <h2>行內元素的 margin / padding</h2>
    <p class="stage inline-lines">
      第一行文字
      <span class="inline-chip">span：有 margin 與 padding</span>
      旁邊文字<br>
      第二行文字用來觀察：行內元素上下方向的版面影響不像塊級元素那麼直覺。
    </p>
  </section>
</body>
</html>
