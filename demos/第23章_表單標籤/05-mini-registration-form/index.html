<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小型註冊表單整合 Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="page-header">
    <p class="eyebrow">Demo 05</p>
    <h1>小型註冊表單整合</h1>
    <p>
      這個 demo 將本章常見表單標籤整合成一個註冊表單，並在提交時顯示表單資料摘要。
    </p>
  </header>

  <main>
    <section class="demo-section" aria-labelledby="register-title">
      <h2 id="register-title">課程註冊</h2>

      <form id="register-form" action="/register" method="post" enctype="multipart/form-data">
        <fieldset>
          <legend>基本資料</legend>

          <div class="field">
            <label for="username">使用者名稱</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              maxlength="20"
              placeholder="請輸入使用者名稱"
              autocomplete="username"
            >
          </div>

          <div class="field">
            <label for="email">電子信箱</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="name@example.com"
              autocomplete="email"
            >
          </div>

          <div class="field">
            <label for="password">密碼</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              maxlength="30"
              autocomplete="new-password"
            >
          </div>
        </fieldset>

        <fieldset>
          <legend>課程偏好</legend>

          <div class="field">
            <label for="city">所在城市</label>
            <select id="city" name="city" required>
              <option value="">請選擇</option>
              <option value="taipei">台北</option>
              <option value="taichung">台中</option>
              <option value="kaohsiung">高雄</option>
            </select>
          </div>

          <p class="group-label">想學習的主題</p>
          <label class="choice">
            <input type="checkbox" name="topics" value="html" checked>
            HTML
          </label>
          <label class="choice">
            <input type="checkbox" name="topics" value="css">
            CSS
          </label>
          <label class="choice">
            <input type="checkbox" name="topics" value="javascript">
            JavaScript
          </label>

          <p class="group-label">通知方式</p>
          <label class="choice">
            <input type="radio" name="notice" value="email" checked>
            電子信箱
          </label>
          <label class="choice">
            <input type="radio" name="notice" value="sms">
            簡訊
          </label>
        </fieldset>

        <fieldset>
          <legend>補充資訊</legend>

          <div class="field">
            <label for="bio">自我介紹</label>
            <textarea id="bio" name="bio" rows="5" placeholder="簡單說明你的學習目標"></textarea>
          </div>

          <div class="field">
            <label for="avatar">上傳頭像</label>
            <input type="file" id="avatar" name="avatar">
          </div>
        </fieldset>

        <input type="hidden" name="source" value="registration-demo">

        <div class="actions">
          <button type="submit">送出註冊</button>
          <button type="reset">重新填寫</button>
        </div>
      </form>
    </section>

    <section class="demo-section output-section" aria-labelledby="summary-title">
      <h2 id="summary-title">提交摘要</h2>
      <pre id="summary">尚未提交表單。</pre>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
