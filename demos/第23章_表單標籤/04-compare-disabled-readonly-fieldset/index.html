<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>disabled、readonly、fieldset disabled 對照 Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="page-header">
    <p class="eyebrow">Demo 04</p>
    <h1>disabled、readonly 與 fieldset disabled</h1>
    <p>
      這個 demo 示範禁用欄位、唯讀欄位與整組禁用欄位在操作和提交資料上的差異。
    </p>
  </header>

  <main>
    <section class="demo-section" aria-labelledby="form-title">
      <h2 id="form-title">帳號設定表單</h2>

      <form id="account-form" action="/account" method="post">
        <div class="field">
          <label for="account-id">帳號 ID：readonly</label>
          <input type="text" id="account-id" name="accountId" value="member-001" readonly>
        </div>

        <div class="field">
          <label for="current-plan">目前方案：disabled</label>
          <input type="text" id="current-plan" name="currentPlan" value="pro" disabled>
        </div>

        <div class="field">
          <label for="display-name">顯示名稱：一般欄位</label>
          <input type="text" id="display-name" name="displayName" value="Alex">
        </div>

        <fieldset disabled>
          <legend>暫停修改的通知設定：fieldset disabled</legend>

          <label>
            <input type="checkbox" name="noticeEmail" value="yes" checked>
            接收電子信箱通知
          </label>

          <label>
            <input type="checkbox" name="noticeSms" value="yes">
            接收簡訊通知
          </label>
        </fieldset>

        <div class="actions">
          <button type="submit">觀察提交資料</button>
          <button type="reset">重置</button>
        </div>
      </form>
    </section>

    <section class="demo-section output-section" aria-labelledby="output-title">
      <h2 id="output-title">提交資料觀察區</h2>
      <p>注意：`disabled` 欄位與 disabled fieldset 裡的欄位不會出現在提交資料中。</p>
      <pre id="output">尚未提交表單。</pre>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
