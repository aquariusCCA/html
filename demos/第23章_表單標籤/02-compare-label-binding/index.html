<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>label 關聯方式對照 Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="page-header">
    <p class="eyebrow">Demo 02</p>
    <h1>label 與表單控制項的關聯</h1>
    <p>
      這個 demo 比較三種寫法：使用 <code>for/id</code> 關聯、
      將控制項包在 <code>&lt;label&gt;</code> 裡，以及沒有建立關聯。
    </p>
  </header>

  <main>
    <section class="demo-section" aria-labelledby="for-id-title">
      <h2 id="for-id-title">正確寫法一：for 對應 id</h2>
      <p>點擊「電子信箱」文字，輸入框會取得焦點。</p>

      <label for="email">電子信箱</label>
      <input type="email" id="email" name="email" placeholder="name@example.com">
    </section>

    <section class="demo-section" aria-labelledby="nested-title">
      <h2 id="nested-title">正確寫法二：控制項放在 label 裡</h2>
      <p>點擊文字也可以切換 checkbox，因為 input 被包在 label 內。</p>

      <label class="choice">
        <input type="checkbox" name="subscribe" value="yes">
        訂閱前端學習電子報
      </label>
    </section>

    <section class="demo-section warning-section" aria-labelledby="plain-title">
      <h2 id="plain-title">對照寫法：只有文字，沒有 label 關聯</h2>
      <p>點擊「手機號碼」文字，不會讓輸入框取得焦點。</p>

      <span class="fake-label">手機號碼</span>
      <input type="tel" name="phone" placeholder="0912-345-678">
    </section>

    <section class="demo-section output-section" aria-labelledby="focus-title">
      <h2 id="focus-title">焦點觀察區</h2>
      <p id="focus-output">尚未聚焦任何欄位。</p>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
