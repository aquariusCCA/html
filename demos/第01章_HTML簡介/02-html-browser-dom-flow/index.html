<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 到瀏覽器與 DOM 的流程</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>
<body>
  <header class="page-header">
    <p class="eyebrow">HTML / Browser / DOM</p>
    <h1>HTML 如何變成網頁？</h1>
    <p>瀏覽器會讀取 HTML 文字，解析成 DOM，再套用 CSS 與執行 JavaScript，最後顯示成畫面。</p>
  </header>

  <main>
    <section class="flow">
      <button type="button" class="step is-active" data-step="source">1. HTML 原始碼</button>
      <button type="button" class="step" data-step="parse">2. 瀏覽器解析</button>
      <button type="button" class="step" data-step="dom">3. 建立 DOM</button>
      <button type="button" class="step" data-step="render">4. 顯示網頁</button>
    </section>

    <section class="workspace" aria-live="polite">
      <article class="panel">
        <h2 id="stage-title">HTML 原始碼</h2>
        <p id="stage-description">HTML 檔案本身是一份文字檔，裡面使用標籤描述內容與結構。</p>
        <pre id="stage-code"><code>&lt;main&gt;
  &lt;h1&gt;HTML 簡介&lt;/h1&gt;
  &lt;p&gt;HTML 描述網頁內容與結構。&lt;/p&gt;
&lt;/main&gt;</code></pre>
      </article>

      <article class="panel preview-panel">
        <h2>瀏覽器畫面</h2>
        <div class="browser-preview">
          <div class="browser-bar">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div id="render-preview" class="render-preview">
            <h3>HTML 簡介</h3>
            <p>HTML 描述網頁內容與結構。</p>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
