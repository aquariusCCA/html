<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的第一個 HTML5 網頁</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <p class="eyebrow">HTML5 文件骨架</p>
    <h1>我的第一個 HTML5 網頁</h1>
    <p>這個頁面示範一份基本 HTML 文件需要哪些主要結構。</p>
  </header>

  <main>
    <section class="panel">
      <h2>使用者看得到的內容</h2>
      <p>`body` 裡的內容會顯示在瀏覽器頁面中，例如標題、段落、連結與圖片。</p>
      <a href="https://developer.mozilla.org/zh-TW/docs/Web/HTML" target="_blank" rel="noreferrer">閱讀 MDN HTML 文件</a>
    </section>

    <section class="panel">
      <h2>文件資訊放在哪裡？</h2>
      <p>`head` 裡的 `meta`、`title`、`link` 通常不直接顯示在頁面主體，但會影響瀏覽器如何理解與載入文件。</p>
      <dl class="structure-list">
        <div>
          <dt>`<!doctype html>`</dt>
          <dd>告訴瀏覽器用 HTML5 的方式解析文件。</dd>
        </div>
        <div>
          <dt>`html lang="zh-Hant"`</dt>
          <dd>宣告文件根元素與主要語言。</dd>
        </div>
        <div>
          <dt>`meta charset="UTF-8"`</dt>
          <dd>設定字元編碼，避免中文顯示錯誤。</dd>
        </div>
      </dl>
    </section>
  </main>
</body>
</html>
