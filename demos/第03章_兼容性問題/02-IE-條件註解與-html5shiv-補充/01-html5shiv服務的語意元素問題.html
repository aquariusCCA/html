<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>html5shiv 服務的語意元素問題</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      max-width: 760px;
      padding: 16px;
    }

    header,
    main,
    article {
      border: 1px solid #93c5fd;
      display: block;
      margin-bottom: 12px;
      padding: 12px;
    }

    .label {
      color: #1d4ed8;
      font-weight: bold;
    }

    .note {
      background-color: #f9fafb;
      border-left: 4px solid #9ca3af;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <h1>html5shiv 服務的語意元素問題</h1>

  <!-- 觀察重點：header、main、article 是筆記中提到的 HTML5 新語意元素。 -->

  <section>
    <h2>觀察範例</h2>

    <header>
      <p class="label">&lt;header&gt;</p>
      <h1>網站標題</h1>
    </header>

    <main>
      <p class="label">&lt;main&gt;</p>
      <article>
        <p class="label">&lt;article&gt;</p>
        <h2>文章標題</h2>
        <p>文章內容。</p>
      </article>
    </main>

    <p class="note">現代瀏覽器可以直接理解這些 HTML5 語意元素；html5shiv 的用途，是協助 IE6 到 IE8 比較安全地識別與樣式化這些元素。</p>
  </section>
</body>
</html>
