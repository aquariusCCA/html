<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>條件判斷符號對照</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      max-width: 860px;
      padding: 16px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #f3f4f6;
    }

    code {
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <h1>條件判斷符號對照</h1>

  <!-- 觀察重點：從條件中的符號判斷是哪一批 IE 版本會看到內容。 -->

  <section>
    <h2>觀察範例</h2>

    <table>
      <thead>
        <tr>
          <th>條件</th>
          <th>意思</th>
          <th>範例理解</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><code>IE 8</code></td>
          <td>指定版本</td>
          <td>僅 IE8 可見。</td>
        </tr>
        <tr>
          <td><code>gt IE 8</code></td>
          <td>大於</td>
          <td>高於 IE8 的 IE 可見。</td>
        </tr>
        <tr>
          <td><code>lt IE 8</code></td>
          <td>小於</td>
          <td>低於 IE8 的 IE 可見。</td>
        </tr>
        <tr>
          <td><code>gte IE 8</code></td>
          <td>大於等於</td>
          <td>IE8 以上可見。</td>
        </tr>
        <tr>
          <td><code>lte IE 8</code></td>
          <td>小於等於</td>
          <td>IE8 及以下可見。</td>
        </tr>
        <tr>
          <td><code>!IE 8</code></td>
          <td>邏輯非</td>
          <td>非 IE8 的 IE 可見。</td>
        </tr>
      </tbody>
    </table>
  </section>
</body>
</html>
