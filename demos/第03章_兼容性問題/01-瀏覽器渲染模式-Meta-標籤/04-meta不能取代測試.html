<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <title>meta 不能取代測試</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 32px;
      color: #1f2937;
    }

    .layout {
      max-width: 760px;
    }

    .example {
      border: 1px solid #d1d5db;
      margin: 16px 0;
      padding: 14px 16px;
    }

    .wrong {
      border-left: 4px solid #dc2626;
      background: #fef2f2;
    }

    .right {
      border-left: 4px solid #16a34a;
      background: #f0fdf4;
    }
  </style>
</head>
<body>
  <main class="layout">
    <h1>meta 不能取代測試</h1>

    <!-- 觀察重點：相容性 meta 只能影響特定瀏覽器的渲染選擇。 -->

    <section>
      <h2>錯誤與修正</h2>

      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <p>以為加入相容性 meta 之後，所有瀏覽器支援問題都會自動消失。</p>
      </div>

      <div class="example right">
        <h3>正確理解</h3>
        <p>
          相容性 meta 只針對特定瀏覽器情境提供提示。
          如果 HTML、CSS 或 JavaScript 功能本身不被目標瀏覽器支援，
          仍然需要查支援情況、測試，必要時提供替代或降級方案。
        </p>
      </div>
    </section>

    <section>
      <h2>建議修改</h2>
      <p>
        修改「錯誤寫法」中的句子，改寫成另一個你在舊教材中可能看到的誤解。
        保留「錯誤寫法」標示，避免把錯誤觀念當成建議。
      </p>
    </section>
  </main>
</body>
</html>
