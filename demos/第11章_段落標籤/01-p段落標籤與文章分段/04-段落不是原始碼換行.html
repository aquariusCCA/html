<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>段落不是原始碼換行</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>段落不是原始碼換行</h1>

  <!-- 觀察重點：HTML 原始碼中的換行主要方便開發者閱讀，不等於新的段落。 -->

  <section>
    <h2>錯誤與較好寫法</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <p>
          第一段文字。
          第二段文字。
        </p>
      </div>

      <div class="example correct">
        <h3>較好的寫法</h3>
        <p>第一段文字。</p>
        <p>第二段文字。</p>
      </div>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;!-- 不建議：兩句仍在同一個 p 裡 --&gt;
&lt;p&gt;
  第一段文字。
  第二段文字。
&lt;/p&gt;

&lt;!-- 較好：不同段落使用不同 p --&gt;
&lt;p&gt;第一段文字。&lt;/p&gt;
&lt;p&gt;第二段文字。&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把左側範例改成三句文字，觀察它們仍然屬於同一段；再把三句分成三個 <code>&lt;p&gt;</code>。</p>
  </section>
</body>
</html>
