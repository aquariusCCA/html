<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>p 不要包住清單結構</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>p 不要包住清單結構</h1>

  <!-- 觀察重點：p 適合文字段落；清單應該使用 ul 和 li，不要硬塞進 p。 -->

  <section>
    <h2>錯誤與較好寫法</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <pre><code>&lt;p&gt;
  文章重點：
  &lt;ul&gt;
    &lt;li&gt;理解標籤語意&lt;/li&gt;
    &lt;li&gt;依內容選擇標籤&lt;/li&gt;
  &lt;/ul&gt;
&lt;/p&gt;</code></pre>
      </div>

      <div class="example correct">
        <h3>較好的寫法</h3>
        <p>文章重點：</p>
        <ul>
          <li>理解標籤語意</li>
          <li>依內容選擇標籤</li>
        </ul>
      </div>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p&gt;文章重點：&lt;/p&gt;
&lt;ul&gt;
  &lt;li&gt;理解標籤語意&lt;/li&gt;
  &lt;li&gt;依內容選擇標籤&lt;/li&gt;
&lt;/ul&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>在清單中新增一個重點，並確認 <code>&lt;ul&gt;</code> 仍然沒有被包在 <code>&lt;p&gt;</code> 裡。</p>
  </section>
</body>
</html>
