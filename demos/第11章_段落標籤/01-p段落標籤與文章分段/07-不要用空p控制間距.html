<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>不要用空 p 控制間距</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    .spaced p {
      margin-bottom: 16px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>不要用空 p 控制間距</h1>

  <!-- 觀察重點：HTML 負責段落語意，段落間距應該交給 CSS。 -->

  <section>
    <h2>錯誤與較好寫法</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <p>第一段文字。</p>
        <p></p>
        <p>第二段文字。</p>
      </div>

      <div class="example correct spaced">
        <h3>較好的寫法</h3>
        <p>第一段文字。</p>
        <p>第二段文字。</p>
      </div>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;!-- 不建議：用空 p 製造間距 --&gt;
&lt;p&gt;第一段文字。&lt;/p&gt;
&lt;p&gt;&lt;/p&gt;
&lt;p&gt;第二段文字。&lt;/p&gt;

&lt;!-- 較好：用 CSS 調整段落間距 --&gt;
p {
  margin-bottom: 16px;
}</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>刪除左側的空 <code>&lt;p&gt;</code>，再調整 <code>.spaced p</code> 的 <code>margin-bottom</code> 數值觀察間距變化。</p>
  </section>
</body>
</html>
