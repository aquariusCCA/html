<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>瀏覽器預設段落外觀</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }

    .sample {
      border: 1px solid #d8dee4;
      padding: 16px;
      max-width: 440px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>瀏覽器預設段落外觀</h1>

  <!-- 觀察重點：p 通常獨佔區塊、上下有預設外距，文字會依容器寬度自動換行。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="note">下面的範例沒有替 <code>p</code> 設定專屬樣式，請觀察瀏覽器預設提供的段落間距與自動換行。</p>

    <div class="sample">
      <p>第一段文字比較長，當內容超過容器寬度時，瀏覽器會依照可用寬度自動換行，而不是需要在 HTML 原始碼中手動斷行。</p>
      <p>第二段文字會和第一段分開顯示，因為它是另一個 p 元素，也代表另一個內容段落。</p>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p&gt;第一段文字比較長，瀏覽器會依照容器寬度自動換行。&lt;/p&gt;
&lt;p&gt;第二段文字會和第一段分開顯示。&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把第一段文字加長，或調整 <code>.sample</code> 的 <code>max-width</code>，觀察段落文字如何自動換行。</p>
  </section>
</body>
</html>
