<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>p 表示完整段落</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }

    .sample {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>p 表示完整段落</h1>

  <!-- 觀察重點：p 標籤用來包住一段完整意思的文字。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="note"><code>&lt;p&gt;</code> 是 paragraph 的縮寫，語意是「段落」。當一段文字在內容上形成完整意思，就可以用一組 <code>&lt;p&gt;</code> 和 <code>&lt;/p&gt;</code> 包起來。</p>

    <div class="sample">
      <p>這是一個段落。它表達一個完整的意思，適合使用 p 標籤標記。</p>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p&gt;這是一個段落。&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把觀察範例中的文字改成一句商品介紹或教學說明，並保留完整的 <code>&lt;p&gt;</code> 結構。</p>
  </section>
</body>
</html>
