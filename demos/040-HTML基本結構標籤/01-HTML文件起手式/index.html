<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML 文件起手式 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Source notes: notes/040-HTML基本結構標籤/01-HTML文件起手式.md -->
  <main class="demo-shell">
    <header class="demo-header">
      <p class="source-label">notes/040-HTML基本結構標籤/01-HTML文件起手式.md</p>
      <h1>HTML 文件起手式</h1>
      <p>切換不同開頭寫法，觀察 DOCTYPE、lang 與 charset 如何影響文件被理解的狀態。</p>
    </header>

    <section class="scenario-switcher" aria-label="文件開頭情境">
      <button class="scenario-button is-active" type="button" data-scenario="correct">正確骨架</button>
      <button class="scenario-button" type="button" data-scenario="doctypeInside">DOCTYPE 放錯位置</button>
      <button class="scenario-button" type="button" data-scenario="missingCharset">缺少 charset</button>
      <button class="scenario-button" type="button" data-scenario="langMismatch">lang 不一致</button>
    </section>

    <section class="workbench" aria-live="polite">
      <div class="code-panel">
        <div class="panel-title">HTML 原始碼</div>
        <pre><code id="html-code"></code></pre>
      </div>

      <div class="result-panel">
        <div class="panel-title">解析檢查面板（簡化示意）</div>
        <ul class="check-list">
          <li id="doctype-check">
            <span class="status-dot"></span>
            <span class="check-text"></span>
          </li>
          <li id="lang-check">
            <span class="status-dot"></span>
            <span class="check-text"></span>
          </li>
          <li id="charset-check">
            <span class="status-dot"></span>
            <span class="check-text"></span>
          </li>
        </ul>

        <div class="document-preview" aria-label="頁面預覽">
          <div class="browser-bar">
            <span></span>
            <span></span>
            <span></span>
            <strong id="preview-title"></strong>
          </div>
          <div class="preview-page">
            <p class="lang-badge" id="preview-lang"></p>
            <h2 id="preview-heading"></h2>
            <p id="preview-body"></p>
          </div>
        </div>

        <p class="takeaway" id="takeaway"></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
