<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>head 與 body 分工</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      margin-bottom: 16px;
      max-width: 680px;
      padding: 16px;
    }

    .setting {
      color: #1d4ed8;
      font-weight: bold;
    }

    .visible {
      color: #166534;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>head 與 body 分工</h1>

  <!-- 觀察重點：head 放文件設定，body 放頁面可見內容。 -->

  <section>
    <h2>head 裡的設定</h2>
    <p class="setting">這個檔案的字元編碼與分頁標題都寫在 head 裡。</p>
    <p>請觀察瀏覽器分頁上的標題：head 與 body 分工。</p>
  </section>

  <section>
    <h2>body 裡的內容</h2>
    <p class="visible">這段文字會顯示在頁面上，因為它寫在 body 裡。</p>
    <p>如果要讓使用者閱讀或操作內容，通常應該放在 body。</p>
  </section>
</body>
</html>
