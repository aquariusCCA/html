<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>結構標籤角色</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      max-width: 720px;
      padding: 16px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #f3f4f6;
    }
  </style>
</head>
<body>
  <h1>結構標籤角色</h1>

  <!-- 觀察重點：不同骨架成員負責不同工作，不是所有內容都會顯示在頁面主體。 -->

  <section>
    <h2>觀察範例</h2>
    <table>
      <thead>
        <tr>
          <th>結構</th>
          <th>主要作用</th>
          <th>觀察方式</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>&lt;!doctype html&gt;</td>
          <td>告訴瀏覽器用標準模式解析 HTML。</td>
          <td>看原始碼最上方。</td>
        </tr>
        <tr>
          <td>&lt;html lang="zh-Hant"&gt;</td>
          <td>包住整份 HTML 文件。</td>
          <td>看 head 和 body 都在 html 裡。</td>
        </tr>
        <tr>
          <td>&lt;head&gt;</td>
          <td>放文件設定與描述資訊。</td>
          <td>看 title 與 meta 都放在 head 裡。</td>
        </tr>
        <tr>
          <td>&lt;body&gt;</td>
          <td>放使用者會在頁面中看到的主要內容。</td>
          <td>看這個表格與段落都在 body 裡。</td>
        </tr>
      </tbody>
    </table>
  </section>
</body>
</html>
