<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>基本 HTML5 文件骨架</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      max-width: 680px;
      padding: 16px;
    }

    .hint {
      color: #374151;
    }
  </style>
</head>
<body>
  <h1>基本 HTML5 文件骨架</h1>

  <!-- 觀察重點：這個檔案本身就是一份完整 HTML5 文件骨架。 -->

  <section>
    <h2>觀察範例</h2>
    <p>這是一段會顯示在頁面上的內容，因為它放在 body 裡。</p>
    <p class="hint">請打開原始碼，觀察 doctype、html、head、meta、title 與 body 的位置。</p>
  </section>

</html>
