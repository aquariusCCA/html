<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>標籤基本組成</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      margin-bottom: 16px;
      max-width: 720px;
      padding: 16px;
    }

    .code-line {
      background-color: #f9fafb;
      border: 1px solid #d1d5db;
      font-family: Consolas, monospace;
      padding: 8px;
    }

    .start,
    .end {
      background-color: #dbeafe;
      padding: 2px 4px;
    }

    .content {
      background-color: #fef3c7;
      padding: 2px 4px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>標籤基本組成</h1>

  <!-- 觀察重點：觀察起始標籤、內容與結束標籤如何合成一個元素。 -->

  <section>
    <h2>段落元素拆解</h2>
    <p class="code-line"><span class="start">&lt;p&gt;</span><span class="content">這是一段文字。</span><span class="end">&lt;/p&gt;</span></p>
    <p>上面整段程式碼是一個段落元素，其中藍色部分是標籤，黃色部分是內容。</p>
  </section>

  <section>
    <h2>標籤與元素</h2>
    <table>
      <tr>
        <th>部分</th>
        <th>說明</th>
      </tr>
      <tr>
        <td><code>&lt;p&gt;</code></td>
        <td>起始標籤，表示段落元素開始。</td>
      </tr>
      <tr>
        <td><code>這是一段文字。</code></td>
        <td>元素內容。</td>
      </tr>
      <tr>
        <td><code>&lt;/p&gt;</code></td>
        <td>結束標籤，表示段落元素結束。</td>
      </tr>
      <tr>
        <td><code>&lt;p&gt;這是一段文字。&lt;/p&gt;</code></td>
        <td>由標籤與內容形成的完整段落元素。</td>
      </tr>
    </table>
  </section>
</body>
</html>
