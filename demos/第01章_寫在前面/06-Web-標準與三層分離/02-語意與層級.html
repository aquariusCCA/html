<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>語意與層級</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      padding: 16px;
      max-width: 640px;
    }

    .article-title {
      color: #1f2937;
      border-bottom: 2px solid #2563eb;
      padding-bottom: 6px;
    }

    .article-content {
      color: #374151;
    }
  </style>
</head>
<body>
  <h1>語意與層級</h1>

  <!-- 觀察重點：h1 表示主要標題，p 表示段落；CSS 只改外觀，不改語意。 -->

  <section>
    <h2>觀察範例</h2>
    <h1 class="article-title">文章標題</h1>
    <p class="article-content">文章內容。</p>
  </section>
</body>
</html>
