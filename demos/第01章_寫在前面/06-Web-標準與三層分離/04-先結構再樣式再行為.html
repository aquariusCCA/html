<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>先結構再樣式再行為</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.7;
      margin: 32px;
    }

    section {
      border: 1px solid #d1d5db;
      padding: 16px;
      max-width: 640px;
    }

    .notice {
      color: red;
      font-size: 20px;
    }

    .primary-button {
      color: white;
      background-color: #2563eb;
      border: 0;
      padding: 8px 14px;
      font-size: 16px;
    }

    .message {
      color: #166534;
    }
  </style>
</head>
<body>
  <h1>先結構再樣式再行為</h1>

  <!-- 觀察重點：先確認內容與 HTML 層級，再用 CSS 處理外觀，最後才加入必要互動。 -->

  <section>
    <h2>觀察範例</h2>

    <!-- 1. 先寫內容與語意層級 -->
    <h1>重要提醒</h1>
    <p class="notice">學 HTML 時，應先重視結構正確，再處理樣式與互動。</p>

    <!-- 2. CSS 已在 head 中負責 notice 與 button 的外觀 -->
    <button class="primary-button" type="button">我知道了</button>

    <!-- 3. JavaScript 只負責點擊後的行為 -->
    <p class="message">尚未確認</p>
  </section>

  <script>
    document.querySelector(".primary-button").addEventListener("click", function () {
      document.querySelector(".message").textContent = "已確認這個學習順序";
    });
  </script>
</body>
</html>
