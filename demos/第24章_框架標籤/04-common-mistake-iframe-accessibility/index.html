<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe 常見錯誤檢查 Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="page-header">
    <p class="eyebrow">Demo 04</p>
    <h1>iframe 常見錯誤與修正</h1>
    <p>
      這個 demo 用檢查器對照錯誤寫法與修正寫法，重點包含
      <code>title</code>、<code>target</code> 對應與固定寬度。
    </p>
  </header>

  <main>
    <div class="compare-grid">
      <section class="demo-card mistake-card" data-case="bad" aria-labelledby="bad-title">
        <h2 id="bad-title">錯誤寫法</h2>
        <p>這一組故意保留常見問題，點擊檢查按鈕觀察報告。</p>

        <a class="sample-link" href="./content/safe-preview.html" target="missing-frame">
          嘗試載入內容
        </a>

        <div class="frame-wrap">
          <iframe
            src="./content/safe-preview.html"
            name="lesson-frame"
            width="900"
            height="220"
          ></iframe>
        </div>
      </section>

      <section class="demo-card fixed-card" data-case="good" aria-labelledby="good-title">
        <h2 id="good-title">修正寫法</h2>
        <p>這一組提供清楚的 title、相同的 target/name，並使用 CSS 控制尺寸。</p>

        <a class="sample-link" href="./content/safe-preview.html" target="lesson-frame-fixed">
          載入內容
        </a>

        <iframe
          src="./content/safe-preview.html"
          name="lesson-frame-fixed"
          title="課程預覽內容"
          class="responsive-frame"
        ></iframe>
      </section>
    </div>

    <section class="demo-section" aria-labelledby="checker-title">
      <h2 id="checker-title">檢查結果</h2>
      <button type="button" data-check>檢查 iframe 寫法</button>
      <div class="result-grid">
        <div>
          <h3>錯誤寫法檢查</h3>
          <ul id="bad-result">
            <li>尚未檢查。</li>
          </ul>
        </div>
        <div>
          <h3>修正寫法檢查</h3>
          <ul id="good-result">
            <li>尚未檢查。</li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
