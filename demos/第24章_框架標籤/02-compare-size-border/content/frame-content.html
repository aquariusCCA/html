<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe 尺寸內容</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff7ed;
      color: #7c2d12;
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .layout-line {
      width: 620px;
      border-radius: 6px;
      background: #fed7aa;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>iframe 內部內容</h1>
  <p class="layout-line">
    這一行內容寬度固定為 620px，用來觀察父頁面中的 iframe 尺寸與捲動效果。
  </p>
  <p>父頁面可以控制 iframe 外框大小，但 iframe 內部文件仍有自己的版面。</p>
</body>
</html>
