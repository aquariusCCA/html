<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>內嵌頁面</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ecfeff;
      color: #164e63;
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }

    .badge {
      display: inline-block;
      margin-bottom: 12px;
      border-radius: 999px;
      background: #0e7490;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 700;
      padding: 4px 10px;
    }
  </style>
</head>
<body>
  <span class="badge">iframe 內部文件</span>
  <h1>這是一個被 iframe 載入的頁面</h1>
  <p>
    這份 HTML 文件不是父頁面的某一段內容，而是被
    <code>&lt;iframe src="./content/embedded-page.html"&gt;</code>
    載入的另一個文件。
  </p>
  <p>你可以修改這個檔案的文字或背景色，再回到父頁面觀察 iframe 內容變化。</p>
</body>
</html>
