<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>完整頁面結構層級</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 0;
      color: #222;
    }

    .site-header,
    .site-footer {
      background: #f3f7ff;
      border-block: 1px solid #c9d8f2;
      padding: 24px 32px;
    }

    nav a {
      display: inline-block;
      margin-right: 12px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 20px;
      padding: 24px 32px;
    }

    article,
    aside {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    article header {
      border-bottom: 1px solid #d8dee4;
      margin-bottom: 16px;
      padding-bottom: 12px;
    }

    section {
      border-left: 4px solid #2f6fed;
      margin-block: 18px;
      padding-left: 14px;
    }

    .tag-note {
      color: #2f6fed;
      font-weight: bold;
    }

    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 觀察重點：頁面、文章、段落與補充資訊可以形成清楚的語意層級。 -->

  <header class="site-header">
    <p class="tag-note">頁面 header</p>
    <h1>完整頁面結構層級</h1>
    <nav>
      <a href="/">首頁</a>
      <a href="/html">HTML</a>
      <a href="/css">CSS</a>
    </nav>
  </header>

  <main>
    <article>
      <header>
        <p class="tag-note">article 裡的 header</p>
        <h2>語意化標籤入門</h2>
        <p>發布日期：2026-06-06</p>
      </header>

      <section>
        <h3>為什麼需要語意化</h3>
        <p>語意化標籤可以讓頁面結構更清楚。</p>
      </section>

      <section>
        <h3>常見標籤</h3>
        <p>常見標籤包含 header、nav、main、article、section、aside、footer。</p>
      </section>
    </article>

    <aside>
      <p class="tag-note">aside</p>
      <h2>相關文章</h2>
      <a href="/html/basic">HTML 基礎結構</a>
    </aside>
  </main>

  <footer class="site-footer">
    <p>Copyright 2026 Frontend Notes</p>
  </footer>
</body>
</html>
