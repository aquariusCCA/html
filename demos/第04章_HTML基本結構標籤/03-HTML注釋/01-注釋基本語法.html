<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>注釋基本語法</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
    }

    code,
    pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    pre {
      background: #f4f4f4;
      border-left: 4px solid #555;
      padding: 1rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>注釋基本語法</h1>

  <!-- 觀察重點：HTML 注釋使用固定的開始與結束符號。 -->

  <section>
    <h2>觀察範例</h2>
    <p>下面這段程式碼示範 HTML 注釋的開始與結束符號。</p>

    <pre><code>&lt;!-- 這是一段 HTML 注釋 --&gt;</code></pre>

    <p>注釋以 <code>&lt;!--</code> 開頭，以 <code>--&gt;</code> 結束。</p>
  </section>

  <section>
    <h2>實際原始碼中的注釋</h2>
    <!-- 這段注釋存在於 HTML 原始碼中，但不會顯示在頁面畫面上。 -->
    <p>這段文字會顯示在頁面上。</p>
  </section>
</body>
</html>
