<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>注釋結尾錯誤對照</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
    }

    .wrong {
      border-left: 4px solid #b00020;
      padding-left: 1rem;
    }

    .correct {
      border-left: 4px solid #1b7f3a;
      padding-left: 1rem;
    }

    pre {
      background: #f4f4f4;
      padding: 1rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>注釋結尾錯誤對照</h1>

  <!-- 觀察重點：注釋沒有正確結束時，後面的 HTML 可能會被當成注釋內容。 -->

  <section class="wrong">
    <h2>錯誤寫法</h2>
    <pre><code>&lt;!-- 主要內容開始
&lt;main&gt;
  &lt;h1&gt;文章標題&lt;/h1&gt;
&lt;/main&gt;</code></pre>
    <p>這段少了 <code>--&gt;</code>，後面的 HTML 可能會被瀏覽器當成注釋內容。</p>
  </section>

  <section class="correct">
    <h2>正確寫法</h2>
    <pre><code>&lt;!-- 主要內容開始 --&gt;
&lt;main&gt;
  &lt;h1&gt;文章標題&lt;/h1&gt;
&lt;/main&gt;</code></pre>
    <p>注釋完整結束後，後面的 HTML 會照常被瀏覽器解析。</p>
  </section>
</body>
</html>
