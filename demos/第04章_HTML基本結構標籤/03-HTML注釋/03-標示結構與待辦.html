<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>標示結構與待辦</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
    }

    main,
    nav {
      border: 1px solid #888;
      padding: 1rem;
      margin-block: 1rem;
    }

    pre {
      background: #f4f4f4;
      border-left: 4px solid #555;
      padding: 1rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>標示結構與待辦</h1>

  <!-- 觀察重點：注釋可以標示區塊，也可以留下後續調整提醒。 -->

  <section>
    <h2>觀察範例</h2>

    <!-- 主要內容開始 -->
    <main>
      <h1>文章標題</h1>
      <p>文章內容。</p>
    </main>
    <!-- 主要內容結束 -->

    <!-- TODO: 之後補上文章分類導覽 -->
    <nav>
      <a href="/articles">全部文章</a>
    </nav>
  </section>

  <section>
    <h2>對應原始碼片段</h2>
    <pre><code>&lt;!-- 主要內容開始 --&gt;
&lt;main&gt;
  &lt;h1&gt;文章標題&lt;/h1&gt;
  &lt;p&gt;文章內容。&lt;/p&gt;
&lt;/main&gt;
&lt;!-- 主要內容結束 --&gt;

&lt;!-- TODO: 之後補上文章分類導覽 --&gt;
&lt;nav&gt;
  &lt;a href="/articles"&gt;全部文章&lt;/a&gt;
&lt;/nav&gt;</code></pre>
  </section>
</body>
</html>
