<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>注釋內容使用原則</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.7;
      margin: 2rem;
    }

    .compare {
      border: 1px solid #888;
      padding: 1rem;
      margin-block: 1rem;
    }

    .wrong {
      border-left: 4px solid #b00020;
    }

    .better {
      border-left: 4px solid #1b7f3a;
    }

    pre {
      background: #f4f4f4;
      padding: 1rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>注釋內容使用原則</h1>

  <!-- 觀察重點：好的注釋說明原因；不該公開的資訊不要放進注釋。 -->

  <section>
    <h2>比較注釋價值</h2>

    <div class="compare wrong">
      <h2>不太有價值的注釋</h2>
      <pre><code>&lt;!-- 這是一個 h1 --&gt;
&lt;h1&gt;網站標題&lt;/h1&gt;</code></pre>
      <p>這種注釋只是重複描述標籤本身。</p>
    </div>

    <div class="compare better">
      <h2>比較有價值的注釋</h2>
      <pre><code>&lt;!-- 首頁主標題：配合 SEO，每頁只保留一個 h1 --&gt;
&lt;h1&gt;網站標題&lt;/h1&gt;</code></pre>
      <p>這種注釋說明這段結構存在的原因。</p>
    </div>
  </section>

  <section class="compare wrong">
    <h2>錯誤寫法：把敏感資訊放進注釋</h2>
    <pre><code>&lt;!-- 密碼、金鑰或私人資料不應該寫在 HTML 注釋裡 --&gt;</code></pre>
    <p>注釋不會顯示在畫面上，但仍可能出現在前端原始碼裡。</p>
  </section>
</body>
</html>
