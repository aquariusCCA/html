<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>屬性位置</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .compare {
      display: grid;
      gap: 16px;
    }

    .example {
      border: 1px solid #ddd;
      padding: 16px;
    }

    .right {
      border-left: 4px solid #238636;
    }

    .wrong {
      border-left: 4px solid #c03221;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>屬性位置</h1>

  <!-- 觀察重點：屬性要寫在開始標籤或單標籤內，不寫在結束標籤。 -->

  <section>
    <h2>觀察範例</h2>
    <div class="compare">
      <div class="example right">
        <h3>正確寫法</h3>
        <pre><code>&lt;p title="提示文字"&gt;這是一段文字&lt;/p&gt;</code></pre>
        <p title="提示文字">這是一段文字</p>
      </div>

      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <pre><code>&lt;p&gt;這是一段文字&lt;/p title="提示文字"&gt;</code></pre>
        <p>結束標籤只負責結束元素，不放屬性。</p>
      </div>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把正確寫法中的 <code>title</code> 改成另一段提示文字，確認屬性仍寫在開始標籤內。</p>
  </section>
</body>
</html>
