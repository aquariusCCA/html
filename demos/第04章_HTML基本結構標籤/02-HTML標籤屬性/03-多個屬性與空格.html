<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>多個屬性與空格</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    input {
      display: block;
      font: inherit;
      margin: 8px 0 16px;
      padding: 8px;
      width: 260px;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 16px;
      overflow-x: auto;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }
  </style>
</head>
<body>
  <h1>多個屬性與空格</h1>

  <!-- 觀察重點：同一個標籤可以有多個屬性，屬性之間用空格分隔。 -->

  <section>
    <h2>觀察範例</h2>
    <p>電子郵件</p>
    <input type="email" name="email" placeholder="請輸入電子郵件">

    <pre><code>&lt;input type="email" name="email" placeholder="請輸入電子郵件"&gt;</code></pre>

    <p class="note">
      <code>type</code>、<code>name</code>、<code>placeholder</code> 都寫在同一個單標籤內，彼此用空格分開。
    </p>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把 <code>placeholder</code> 改成「請輸入常用信箱」，觀察輸入欄位中的提示文字。</p>
  </section>
</body>
</html>
