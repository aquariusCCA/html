<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>布林屬性 disabled</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    input {
      display: block;
      font: inherit;
      margin: 8px 0 16px;
      padding: 8px;
      width: 260px;
    }

    .group {
      border: 1px solid #ddd;
      padding: 16px;
      margin-bottom: 16px;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>布林屬性 disabled</h1>

  <!-- 觀察重點：布林屬性只要屬性名出現，就代表該狀態成立。 -->

  <section>
    <h2>觀察範例</h2>
    <div class="group">
      <p>一般輸入欄位：</p>
      <input type="text" placeholder="可以輸入文字">
      <pre><code>&lt;input type="text" placeholder="可以輸入文字"&gt;</code></pre>
    </div>

    <div class="group">
      <p>停用輸入欄位：</p>
      <input type="text" placeholder="這個欄位已停用" disabled>
      <pre><code>&lt;input type="text" placeholder="這個欄位已停用" disabled&gt;</code></pre>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>移除第二個輸入欄位的 <code>disabled</code>，觀察它是否恢復成可以輸入的狀態。</p>
  </section>
</body>
</html>
