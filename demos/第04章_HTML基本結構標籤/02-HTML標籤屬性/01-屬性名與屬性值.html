<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>屬性名與屬性值</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .demo-text {
      border: 1px solid #ddd;
      padding: 12px 16px;
      width: fit-content;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 16px;
      overflow-x: auto;
    }

    .mark {
      color: #a64200;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>屬性名與屬性值</h1>

  <!-- 觀察重點：多數屬性由屬性名與屬性值組成，寫在開始標籤內。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="demo-text" title="這是 title 屬性的提示文字">把滑鼠移到這段文字上</p>

    <pre><code>&lt;p title="提示文字"&gt;把滑鼠移到這段文字上&lt;/p&gt;
    <span class="mark">title</span> 是屬性名
          <span class="mark">"提示文字"</span> 是屬性值</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>修改 <code>title</code> 的屬性值，再把滑鼠移到段落上觀察提示文字是否改變。</p>
  </section>
</body>
</html>
