<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>lang 語言標示</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .language-list {
      border: 1px solid #ddd;
      padding: 16px 20px;
    }

    .language-list li {
      margin: 8px 0;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>lang 語言標示</h1>

  <!-- 觀察重點：lang 寫在 <html> 上時，表示整份文件的主要語言。 -->

  <section>
    <h2>觀察範例</h2>
    <p>這份 demo 的開頭使用：</p>
    <pre><code>&lt;html lang="zh-Hant"&gt;</code></pre>
    <p>它表示這份文件主要使用繁體中文。</p>
  </section>

  <section>
    <h2>常見語言值</h2>
    <ul class="language-list">
      <li><code>en</code>：英語</li>
      <li><code>zh-CN</code>：中國大陸中文</li>
      <li><code>zh-Hant</code>：繁體中文</li>
    </ul>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>如果整份頁面主要改成英文內容，可以把第一個 <code>&lt;html&gt;</code> 標籤改成 <code>&lt;html lang="en"&gt;</code>。</p>
  </section>
</body>
</html>
