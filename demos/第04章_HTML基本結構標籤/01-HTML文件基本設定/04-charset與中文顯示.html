<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>charset 與中文顯示</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .sample {
      border: 1px solid #ddd;
      background: #fafafa;
      padding: 16px;
    }

    .wrong {
      border-left: 4px solid #c03221;
      padding-left: 12px;
    }

    .right {
      border-left: 4px solid #238636;
      padding-left: 12px;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>charset 與中文顯示</h1>

  <!-- 觀察重點：<meta charset="UTF-8"> 放在 <head> 中，用來指定字元編碼。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="sample">繁體中文、English、符號：，。！？都應該正常顯示。</p>
    <pre><code>&lt;head&gt;
  &lt;meta charset="UTF-8"&gt;
  &lt;title&gt;charset 與中文顯示&lt;/title&gt;
&lt;/head&gt;</code></pre>
  </section>

  <section>
    <h2>錯誤與建議寫法</h2>
    <div class="wrong">
      <h3>錯誤寫法：忘記設定字元編碼</h3>
      <pre><code>&lt;head&gt;
  &lt;title&gt;中文網頁&lt;/title&gt;
&lt;/head&gt;</code></pre>
    </div>

    <div class="right">
      <h3>建議寫法：先設定 UTF-8</h3>
      <pre><code>&lt;head&gt;
  &lt;meta charset="UTF-8"&gt;
  &lt;title&gt;中文網頁&lt;/title&gt;
&lt;/head&gt;</code></pre>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>在觀察範例中加入更多中文或符號，確認頁面仍能正常顯示。</p>
  </section>
</body>
</html>
