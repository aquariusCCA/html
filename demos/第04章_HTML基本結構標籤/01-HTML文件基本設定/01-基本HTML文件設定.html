<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>基本 HTML 文件設定</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 16px;
      overflow-x: auto;
    }

    .marker {
      color: #a64200;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>基本 HTML 文件設定</h1>

  <!-- 觀察重點：HTML 文件開始時先設定解析規則、主要語言與字元編碼。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="note">這份 demo 本身就使用了完整的 HTML 基本結構。</p>

    <pre><code>&lt;!doctype html&gt; <span class="marker">宣告使用 HTML5</span>
&lt;html lang="zh-Hant"&gt; <span class="marker">標示主要語言是繁體中文</span>
&lt;head&gt;
  &lt;meta charset="UTF-8"&gt; <span class="marker">指定字元編碼</span>
  &lt;title&gt;基本 HTML 文件設定&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
  &lt;h1&gt;頁面內容&lt;/h1&gt;
&lt;/body&gt;
&lt;/html&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把上方範例中的 <code>title</code> 與 <code>h1</code> 改成自己的頁面名稱，觀察瀏覽器分頁標題與頁面標題的差異。</p>
  </section>
</body>
</html>
