<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>個人作品集首頁</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }

    .compare {
      border: 1px solid #ddd;
      padding: 16px;
      margin-bottom: 16px;
    }

    .label {
      color: #666;
      font-size: 0.95em;
      margin-bottom: 4px;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>歡迎來到我的網站</h1>

  <!-- 觀察重點：title 顯示在瀏覽器分頁，h1 顯示在頁面內容區。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="note">這份 demo 故意讓 <code>&lt;title&gt;</code> 和 <code>&lt;h1&gt;</code> 的文字不同。分頁上看到的是 <code>個人作品集首頁</code>，頁面中看到的主標題是 <code>歡迎來到我的網站</code>。</p>

    <div class="compare">
      <p class="label">文件標題，寫在 head 裡</p>
      <pre><code>&lt;title&gt;個人作品集首頁&lt;/title&gt;</code></pre>
    </div>

    <div class="compare">
      <p class="label">頁面正文主標題，寫在 body 裡</p>
      <pre><code>&lt;h1&gt;歡迎來到我的網站&lt;/h1&gt;</code></pre>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>先只修改 <code>&lt;title&gt;</code>，觀察分頁標題變化；再只修改 <code>&lt;h1&gt;</code>，觀察頁面內容區的變化。</p>
  </section>
</body>
</html>
