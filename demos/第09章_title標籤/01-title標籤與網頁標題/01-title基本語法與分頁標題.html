<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>title 基本語法與分頁標題</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 16px;
      overflow-x: auto;
    }

    .marker {
      color: #a64200;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>title 基本語法與分頁標題</h1>

  <!-- 觀察重點：title 文字會成為這份 HTML 文件的頁面標題。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="note">開啟這份檔案後，先看瀏覽器分頁上的文字。分頁標題來自 <code>&lt;title&gt;</code> 裡的內容。</p>

    <pre><code>&lt;head&gt;
  &lt;meta charset="UTF-8"&gt;
  &lt;title&gt;<span class="marker">title 基本語法與分頁標題</span>&lt;/title&gt;
&lt;/head&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把 <code>&lt;title&gt;</code> 裡的文字改成 <code>我的第一個 HTML 頁面</code>，重新整理後觀察瀏覽器分頁標題的變化。</p>
  </section>
</body>
</html>
