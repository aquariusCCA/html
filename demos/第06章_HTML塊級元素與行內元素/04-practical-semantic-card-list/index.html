<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語意化課程卡片列表 Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>前端入門課程</h1>
      <nav aria-label="課程分類">
        <a href="#html">HTML</a>
        <a href="#css">CSS</a>
        <a href="#javascript">JavaScript</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="intro" aria-labelledby="intro-title">
      <h2 id="intro-title">用正確元素建立可讀的卡片列表</h2>
      <p>
        外層使用語意區塊組織內容，卡片中的狀態文字使用
        <span class="status">span</span>
        標記局部資訊；整張卡片用單一
        <strong>a</strong>
        包住可點擊內容，避免巢狀連結。
      </p>
    </section>

    <section class="course-section" aria-labelledby="course-title">
      <h2 id="course-title">課程清單</h2>

      <div class="course-grid">
        <article id="html" class="course-item">
          <a class="course-card" href="#html">
            <span class="status">基礎</span>
            <h3>HTML 文件結構</h3>
            <p>理解標題、段落、區塊與行內內容如何組成頁面。</p>
          </a>
        </article>

        <article id="css" class="course-item">
          <a class="course-card" href="#css">
            <span class="status status-next">下一步</span>
            <h3>CSS 排版入門</h3>
            <p>學習如何用 CSS 控制元素顯示方式、間距與版面。</p>
          </a>
        </article>

        <article id="javascript" class="course-item">
          <a class="course-card" href="#javascript">
            <span class="status status-next">下一步</span>
            <h3>JavaScript DOM 操作</h3>
            <p>觀察瀏覽器解析後的 DOM，並使用 JavaScript 操作節點。</p>
          </a>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
