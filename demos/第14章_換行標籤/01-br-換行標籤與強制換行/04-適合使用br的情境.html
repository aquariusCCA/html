<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>適合使用 br 的情境</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #d8dee4;
      border-left: 6px solid #2f855a;
      padding: 16px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>適合使用 br 的情境</h1>

  <!-- 觀察重點：只有換行本身具有內容意義時，才適合使用 br。 -->

  <section>
    <h2>觀察範例</h2>
    <div class="examples">
      <div class="example">
        <h3>地址</h3>
        <p>
          台北市中正區<br>
          重慶南路一段 122 號
        </p>
      </div>

      <div class="example">
        <h3>短詩</h3>
        <p>
          雨停在窗邊<br>
          風把午後翻成一頁<br>
          光慢慢走進房間
        </p>
      </div>

      <div class="example">
        <h3>聯絡資訊</h3>
        <p>
          客服信箱：service@example.com<br>
          服務時間：週一至週五 09:00-18:00
        </p>
      </div>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p&gt;
  台北市中正區&lt;br&gt;
  重慶南路一段 122 號
&lt;/p&gt;

&lt;p&gt;
  客服信箱：service@example.com&lt;br&gt;
  服務時間：週一至週五 09:00-18:00
&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>在聯絡資訊中新增「客服電話：02-1234-5678」，並使用一個 <code>&lt;br&gt;</code> 讓三行仍屬於同一組資訊。</p>
  </section>
</body>
</html>
