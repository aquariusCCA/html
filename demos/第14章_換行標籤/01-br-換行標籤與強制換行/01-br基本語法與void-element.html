<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>br 基本語法與 void element</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .example {
      border: 1px solid #d8dee4;
      border-left: 6px solid #2b6cb0;
      padding: 16px;
      max-width: 560px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>br 基本語法與 void element</h1>

  <!-- 觀察重點：br 不包住內容，也不需要 </br> 結束標籤。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="example">
      第一行文本<br>
      第二行文本<br>
      第三行文本
    </p>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p&gt;
  第一行文本&lt;br&gt;
  第二行文本&lt;br&gt;
  第三行文本
&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>在第二行文本後面移除 <code>&lt;br&gt;</code>，觀察第二行與第三行是否還會固定分行。</p>
  </section>
</body>
</html>
