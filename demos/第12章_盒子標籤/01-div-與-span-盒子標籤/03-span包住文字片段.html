<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>span 包住文字片段</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }

    .sample {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    .keyword {
      color: #b42318;
      background: #fff1f0;
      border-bottom: 2px solid #b42318;
      padding: 0 4px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>span 包住文字片段</h1>

  <!-- 觀察重點：span 適合包住一句話中的一小段行內內容。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="note"><code>&lt;span&gt;</code> 可以標出文字中的幾個字，之後再用 CSS 套樣式，而且不會打斷整個段落。</p>

    <div class="sample">
      <p>今天的課程重點是 <span class="keyword">HTML 盒子標籤</span>。</p>
      <p>這句話仍然是一個完整段落，span 只包住中間的一小段文字。</p>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p&gt;今天的課程重點是 &lt;span class="keyword"&gt;HTML 盒子標籤&lt;/span&gt;。&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把 <code>&lt;span class="keyword"&gt;</code> 改成包住「課程重點」四個字，觀察段落仍然維持同一行的閱讀流動。</p>
  </section>
</body>
</html>
