<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>h1 到 h6 的語意層級</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .note {
      border-left: 4px solid #2f6fed;
      background: #f3f7ff;
      padding: 12px 16px;
    }

    .sample {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>h1 到 h6 的語意層級</h1>

  <!-- 觀察重點：數字越小，標題層級越高；數字越大，層級越深。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="note">下面刻意依序展示 <code>&lt;h1&gt;</code> 到 <code>&lt;h6&gt;</code>。請觀察標籤數字和內容層級的關係，而不是只看字體大小。</p>

    <div class="sample">
      <h1>h1：頁面或文章的主要標題</h1>
      <h2>h2：主要章節標題</h2>
      <h3>h3：h2 底下的小節標題</h3>
      <h4>h4：更細一層的標題</h4>
      <h5>h5：更深層的小標題</h5>
      <h6>h6：最深層的小標題</h6>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;h1&gt;一級標題&lt;/h1&gt;
&lt;h2&gt;二級標題&lt;/h2&gt;
&lt;h3&gt;三級標題&lt;/h3&gt;
&lt;h4&gt;四級標題&lt;/h4&gt;
&lt;h5&gt;五級標題&lt;/h5&gt;
&lt;h6&gt;六級標題&lt;/h6&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把範例文字改成一份課程大綱，並保留 <code>h1</code> 到 <code>h6</code> 的層級順序。</p>
  </section>
</body>
</html>
