<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>外觀大小交給 CSS</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    .campaign-title {
      font-size: 18px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>外觀大小交給 CSS</h1>

  <!-- 觀察重點：不要因為想要比較小的字，就把重要小節改成 h6。 -->

  <section>
    <h2>錯誤與較好寫法</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <h1>商品名稱</h1>
        <h6>促銷活動</h6>
        <p>這裡只是因為想讓「促銷活動」看起來比較小，就選了 <code>h6</code>。</p>
      </div>

      <div class="example correct">
        <h3>較好的寫法</h3>
        <h1>商品名稱</h1>
        <h2 class="campaign-title">促銷活動</h2>
        <p>「促銷活動」仍是商品介紹中的重要小節，所以用 <code>h2</code>，視覺大小交給 CSS。</p>
      </div>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;h1&gt;商品名稱&lt;/h1&gt;
&lt;h2 class="campaign-title"&gt;促銷活動&lt;/h2&gt;</code></pre>

    <pre><code>.campaign-title {
  font-size: 18px;
}</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把 <code>.campaign-title</code> 的 <code>font-size</code> 改成 <code>20px</code>，確認 HTML 標題層級仍然是 <code>h2</code>。</p>
  </section>
</body>
</html>
