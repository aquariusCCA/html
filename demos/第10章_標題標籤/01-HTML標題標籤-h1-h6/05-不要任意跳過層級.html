<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>不要任意跳過標題層級</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
      color: #222;
    }

    section {
      margin-block: 24px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .example {
      border: 1px solid #d8dee4;
      padding: 16px;
    }

    .wrong {
      border-left: 6px solid #c53030;
      background: #fff5f5;
    }

    .correct {
      border-left: 6px solid #2f855a;
      background: #f0fff4;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d8dee4;
      padding: 16px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>不要任意跳過標題層級</h1>

  <!-- 觀察重點：標題層級應該反映內容結構，不要從 h1 直接跳到 h4。 -->

  <section>
    <h2>錯誤與較好寫法</h2>

    <div class="pair">
      <div class="example wrong">
        <h3>錯誤寫法</h3>
        <h1>旅遊指南</h1>
        <h4>交通方式</h4>
        <p>說明如何抵達目的地。</p>
        <h4>住宿建議</h4>
        <p>說明住宿選擇。</p>
      </div>

      <div class="example correct">
        <h3>較好的寫法</h3>
        <h1>旅遊指南</h1>
        <h2>交通方式</h2>
        <p>說明如何抵達目的地。</p>
        <h2>住宿建議</h2>
        <p>說明住宿選擇。</p>
      </div>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;h1&gt;旅遊指南&lt;/h1&gt;
&lt;h2&gt;交通方式&lt;/h2&gt;
&lt;h2&gt;住宿建議&lt;/h2&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>新增「行程安排」和「注意事項」兩個主要章節，並判斷它們應該使用 <code>h2</code> 還是更深層的標題。</p>
  </section>
</body>
</html>
