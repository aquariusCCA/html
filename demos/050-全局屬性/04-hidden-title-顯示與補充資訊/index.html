<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hidden title 顯示與補充資訊 Demo</title>
  <style>
    :root {
      --ink: #202124;
      --muted: #5f6368;
      --line: #d8dee6;
      --panel: #fff;
      --soft: #f6f8fb;
      --accent: #7c3aed;
      --accent-soft: #f1ecff;
      --danger: #9f1239;
      --danger-soft: #fff1f2;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: #f3f1f7; line-height: 1.6; }
    header, main { width: min(1080px, calc(100% - 32px)); margin: 0 auto; }
    header { padding: 28px 0 16px; }
    h1 { margin: 0 0 8px; font-size: clamp(1.6rem, 4vw, 2.3rem); letter-spacing: 0; }
    p { margin: 0; }
    .lead { color: var(--muted); max-width: 780px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    h2 { margin: 0 0 12px; font-size: 1.1rem; }
    label { display: inline-flex; gap: 8px; align-items: center; cursor: pointer; }
    input { width: 18px; height: 18px; }

    .detail, .warning, .weak-warning {
      margin-top: 14px;
      border-radius: 6px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--soft);
    }

    .detail {
      border-color: #c4b5fd;
      background: var(--accent-soft);
    }

    .warning {
      border-color: #fecdd3;
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 700;
    }

    .weak-warning {
      color: var(--muted);
    }

    .state {
      margin-top: 12px;
      color: var(--muted);
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: .92rem;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 10px 12px;
      font: inherit;
      cursor: pointer;
      margin-top: 12px;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Source notes: notes/050-全局屬性/04-hidden-title-顯示與補充資訊.md -->
  <header>
    <h1>hidden 控制顯示，title 補充提示</h1>
    <p class="lead">`hidden` 適合條件式顯示整個元素；`title` 只適合簡短補充，不應承載關鍵警告。</p>
  </header>

  <main class="grid">
    <section aria-labelledby="hidden-title">
      <h2 id="hidden-title">hidden：條件式顯示</h2>
      <label>
        <input id="showDetail" type="checkbox">
        顯示詳細資料
      </label>
      <div id="detail" class="detail" hidden>
        這段內容一開始有 `hidden`，勾選後由 JavaScript 將 `hidden` 移除。
      </div>
      <p id="hiddenState" class="state">目前狀態：detail.hidden = true</p>
    </section>

    <section aria-labelledby="title-title">
      <h2 id="title-title">title：補充資訊，不是主要內容</h2>
      <p class="weak-warning" title="點擊後會永久刪除資料">
        只把警告放在 title：刪除
      </p>
      <button type="button" title="點擊後會永久刪除資料">帶 title 的刪除按鈕</button>
      <div class="warning">
        更可靠：把重要警告直接放成可見文字。刪除後資料無法復原。
      </div>
      <p class="state">滑鼠 hover 可能看到 title，但觸控、鍵盤或輔助工具環境不一定穩定。</p>
    </section>
  </main>

  <script>
    const checkbox = document.getElementById('showDetail');
    const detail = document.getElementById('detail');
    const hiddenState = document.getElementById('hiddenState');

    checkbox.addEventListener('change', function () {
      detail.hidden = !checkbox.checked;
      hiddenState.textContent = '目前狀態：detail.hidden = ' + String(detail.hidden);
    });
  </script>
</body>
</html>
