<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>保留替代操作路徑</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 860px;
    }

    .example {
      border: 1px solid #cccccc;
      margin: 16px 0;
      padding: 16px;
    }

    .task {
      border: 2px solid #6d4c41;
      background: #fff8f2;
      margin-bottom: 12px;
      padding: 16px;
    }

    .done {
      border-color: #2e7d32;
      background: #f4fbf4;
    }

    button {
      font: inherit;
      margin-right: 8px;
      padding: 6px 12px;
    }

    .message {
      background: #f5f5f5;
      padding: 10px 12px;
    }

    code {
      background: #f5f5f5;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>保留替代操作路徑</h1>

  <!-- 觀察重點：即使使用右鍵自訂處理，也應提供一般按鈕等替代操作。 -->

  <section>
    <h2>觀察範例</h2>

    <div class="example">
      <div id="task" class="task">
        <h3>練習項目</h3>
        <p>在這張卡片按右鍵，可以用自訂處理標記完成。</p>
      </div>

      <button id="complete-button" type="button">標記完成</button>
      <button id="reset-button" type="button">重設</button>

      <p id="status" class="message">尚未完成。</p>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>保留按鈕操作，修改右鍵處理中的訊息文字，確認兩種操作都能完成同一件事。</p>
  </section>

  <script>
    const task = document.getElementById("task");
    const completeButton = document.getElementById("complete-button");
    const resetButton = document.getElementById("reset-button");
    const status = document.getElementById("status");

    function markDone(source) {
      task.classList.add("done");
      status.textContent = "已完成。操作來源：" + source;
    }

    task.addEventListener("contextmenu", function (event) {
      event.preventDefault();
      markDone("右鍵自訂處理");
    });

    completeButton.addEventListener("click", function () {
      markDone("標準按鈕");
    });

    resetButton.addEventListener("click", function () {
      task.classList.remove("done");
      status.textContent = "尚未完成。";
    });
  </script>
</body>
</html>
