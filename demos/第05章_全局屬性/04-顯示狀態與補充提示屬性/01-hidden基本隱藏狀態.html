<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>hidden 基本隱藏狀態</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 720px;
    }

    .example {
      border: 1px solid #cccccc;
      margin: 12px 0;
      padding: 12px;
    }

    .visible {
      border-left: 4px solid #238636;
    }

    code {
      background: #f5f5f5;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>hidden 基本隱藏狀態</h1>

  <!-- 觀察重點：有 hidden 屬性的元素不會呈現在頁面上。 -->

  <section>
    <h2>觀察範例</h2>

    <p class="example visible">這是一個沒有隱藏的段落，瀏覽器會顯示它。</p>

    <p class="example" hidden>這是一個有 hidden 屬性的段落，瀏覽器不會顯示它。</p>

    <p>
      上面實際寫了兩個段落，但畫面只看得到沒有設定 <code>hidden</code> 的段落。
    </p>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>移除第二個段落的 <code>hidden</code> 屬性，再重新整理頁面觀察差異。</p>
  </section>
</body>
</html>
