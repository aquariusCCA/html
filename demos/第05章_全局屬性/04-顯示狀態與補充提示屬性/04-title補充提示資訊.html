<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>title 補充提示資訊</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 720px;
    }

    .example {
      border: 1px solid #cccccc;
      margin: 12px 0;
      padding: 12px;
    }

    abbr,
    .has-title {
      text-decoration: underline dotted;
      cursor: help;
    }
  </style>
</head>
<body>
  <h1>title 補充提示資訊</h1>

  <!-- 觀察重點：title 適合放補充說明，不適合放必要資訊。 -->

  <section>
    <h2>觀察範例</h2>

    <p class="example">
      <abbr title="People's Republic of China">PRC</abbr> was founded in 1949.
    </p>

    <p class="example has-title" title="這是額外補充，不是完成任務必須知道的資訊。">
      將滑鼠移到這段文字上，觀察瀏覽器是否顯示提示文字。
    </p>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>修改其中一個 <code>title</code> 內容，再用滑鼠懸停觀察提示文字是否改變。</p>
  </section>
</body>
</html>
