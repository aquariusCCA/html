<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>style 行內樣式與 class 對照</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    section {
      border: 1px solid #ddd;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 720px;
    }

    .comparison {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .sample {
      border: 1px solid #ddd;
      padding: 12px;
    }

    .warning {
      color: red;
      font-weight: bold;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 12px;
      overflow-x: auto;
    }

    @media (max-width: 640px) {
      .comparison {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>style 行內樣式與 class 對照</h1>

  <!-- 觀察重點：style 會直接作用在單一元素上；多個元素共用樣式時，class 比重複行內 style 更容易維護。 -->

  <section>
    <h2>觀察範例</h2>
    <div class="comparison">
      <div class="sample">
        <h3>行內 style</h3>
        <p style="color: red; font-weight: bold;">錯誤訊息</p>
        <p>這個樣式直接寫在元素上。</p>
      </div>

      <div class="sample">
        <h3>class 共用樣式</h3>
        <p class="warning">請重新輸入。</p>
        <p class="warning">此操作無法復原。</p>
      </div>
    </div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p style="color: red; font-weight: bold;"&gt;錯誤訊息&lt;/p&gt;

&lt;p class="warning"&gt;請重新輸入。&lt;/p&gt;
&lt;p class="warning"&gt;此操作無法復原。&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把右側兩段的 <code>class="warning"</code> 移除其中一個，觀察只有留下 class 的段落會套用共用樣式。</p>
  </section>
</body>
</html>
