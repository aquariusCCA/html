<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>class 分類與多個 class</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    section {
      border: 1px solid #ddd;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 640px;
    }

    .notice {
      border-left: 4px solid #238636;
      background: #f0fff4;
      padding: 10px 12px;
    }

    .important {
      font-weight: bold;
    }

    .muted {
      color: #666;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>class 分類與多個 class</h1>

  <!-- 觀察重點：同一個 class 可以重複用在多個元素上，一個元素也可以同時有多個 class。 -->

  <section>
    <h2>觀察範例</h2>
    <p class="notice">系統維護中。</p>
    <p class="notice">請先儲存你的資料。</p>
    <p class="notice important">這一則提醒同時有 notice 與 important 兩個 class。</p>
    <p class="muted">這段文字沒有 notice，所以不會套用提醒樣式。</p>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;p class="notice"&gt;系統維護中。&lt;/p&gt;
&lt;p class="notice"&gt;請先儲存你的資料。&lt;/p&gt;
&lt;p class="notice important"&gt;同時屬於兩個分類。&lt;/p&gt;</code></pre>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把最後一段文字加上 <code>class="notice"</code>，觀察它是否加入同一組提醒樣式。</p>
  </section>
</body>
</html>
