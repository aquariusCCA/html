<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>data-* 自訂資料與 dataset</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    section {
      border: 1px solid #ddd;
      margin-bottom: 20px;
      padding: 16px;
      max-width: 680px;
    }

    .product {
      margin-bottom: 8px;
    }

    .result {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 12px;
      white-space: pre-line;
    }

    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>data-* 自訂資料與 dataset</h1>

  <!-- 觀察重點：data-* 存放自訂資料，畫面不會自動改變；JavaScript 可以透過 dataset 讀取。 -->

  <section>
    <h2>觀察範例</h2>
    <ul>
      <li class="product" data-product-id="A102" data-stock-status="in-stock">無線鍵盤</li>
      <li class="product" data-product-id="B205" data-stock-status="out-of-stock">藍牙滑鼠</li>
    </ul>

    <p>JavaScript 讀取到的資料：</p>
    <div class="result"></div>
  </section>

  <section>
    <h2>對照程式碼</h2>
    <pre><code>&lt;li class="product" data-product-id="A102" data-stock-status="in-stock"&gt;
  無線鍵盤
&lt;/li&gt;</code></pre>
    <p><code>data-product-id</code> 在 <code>dataset</code> 中會變成 <code>productId</code>。</p>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>修改第一項商品的 <code>data-product-id</code> 或 <code>data-stock-status</code>，重新整理後觀察下方讀取結果。</p>
  </section>

  <script>
    const products = document.querySelectorAll(".product");
    const result = document.querySelector(".result");
    let text = "";

    for (let i = 0; i < products.length; i++) {
      text += products[i].textContent.trim() + "：";
      text += products[i].dataset.productId + " / ";
      text += products[i].dataset.stockStatus + "\n";
    }

    result.textContent = text;
  </script>
</body>
</html>
