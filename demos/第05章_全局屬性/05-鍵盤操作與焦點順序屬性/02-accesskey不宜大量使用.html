<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>accesskey 不宜大量使用</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 820px;
    }

    .case {
      border: 1px solid #cccccc;
      margin: 16px 0;
      padding: 16px;
    }

    .wrong {
      border-left: 4px solid #c03221;
    }

    .right {
      border-left: 4px solid #238636;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a,
    button {
      font: inherit;
      padding: 8px 12px;
    }

    code {
      background: #f5f5f5;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>accesskey 不宜大量使用</h1>

  <!-- 觀察重點：快捷鍵太多會難以記憶，也可能和瀏覽器、系統或輔助科技快捷鍵衝突。 -->

  <section>
    <h2>常見錯誤與修正</h2>

    <div class="case wrong">
      <h3>錯誤寫法：每個連結都設定快捷鍵</h3>
      <div class="links">
        <a href="#news" accesskey="n">最新消息</a>
        <a href="#products" accesskey="p">產品介紹</a>
        <a href="#support" accesskey="s">客服中心</a>
        <a href="#contact" accesskey="c">聯絡我們</a>
      </div>
      <p>一般內容頁如果到處都有快捷鍵，使用者不一定知道，也容易造成衝突。</p>
    </div>

    <div class="case right">
      <h3>較好的做法：只保留確定有價值的高頻操作</h3>
      <p>管理後台或內部系統可以針對高頻操作提供明確說明。</p>
      <button type="button" accesskey="s">儲存資料</button>
      <p>快捷鍵：<code>s</code>。實際啟用方式依瀏覽器與作業系統而不同。</p>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>移除錯誤範例中三個不必要的 <code>accesskey</code>，只保留一個真正高頻的操作。</p>
  </section>
</body>
</html>
