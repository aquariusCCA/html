<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>依 DOM 順序排列焦點</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 720px;
    }

    form {
      border: 1px solid #cccccc;
      padding: 16px;
    }

    label {
      display: block;
      margin-top: 12px;
    }

    input,
    button {
      box-sizing: border-box;
      display: block;
      font: inherit;
      margin-top: 4px;
      padding: 8px;
      width: 100%;
    }

    button {
      margin-top: 16px;
    }

    input:focus,
    button:focus {
      outline: 3px solid #1a73e8;
      outline-offset: 2px;
    }

    code {
      background: #f5f5f5;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>依 DOM 順序排列焦點</h1>

  <!-- 觀察重點：沒有另外設定 tabindex 時，表單控制項會依 HTML 的 DOM 順序取得焦點。 -->

  <section>
    <h2>觀察範例</h2>

    <form>
      <label for="name">姓名</label>
      <input id="name" name="name" type="text">

      <label for="email">電子郵件</label>
      <input id="email" name="email" type="email">

      <button type="submit">送出</button>
    </form>

    <p>
      按下 <code>Tab</code> 時，焦點應依序移到「姓名、電子郵件、送出」。這個順序和 HTML 寫法一致。
    </p>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>交換「姓名」與「電子郵件」兩組 HTML 的位置，再按 <code>Tab</code> 觀察焦點順序是否跟著改變。</p>
  </section>
</body>
</html>
