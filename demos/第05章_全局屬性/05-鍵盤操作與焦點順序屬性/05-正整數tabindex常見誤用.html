<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>正整數 tabindex 常見誤用</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 860px;
    }

    .case {
      border: 1px solid #cccccc;
      margin: 18px 0;
      padding: 16px;
    }

    .wrong {
      border-left: 4px solid #c03221;
    }

    .right {
      border-left: 4px solid #238636;
    }

    label {
      display: block;
      margin-top: 12px;
    }

    input,
    button {
      box-sizing: border-box;
      display: block;
      font: inherit;
      margin-top: 4px;
      padding: 8px;
      width: 100%;
    }

    button {
      margin-top: 16px;
    }

    input:focus,
    button:focus {
      outline: 3px solid #1a73e8;
      outline-offset: 2px;
    }

    code {
      background: #f5f5f5;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>正整數 tabindex 常見誤用</h1>

  <!-- 觀察重點：用正整數 tabindex 修補混亂順序，會讓焦點順序脫離 HTML 內容順序。 -->

  <section>
    <h2>常見錯誤與修正</h2>

    <div class="case wrong">
      <h3>錯誤寫法：用正整數 tabindex 重排焦點</h3>
      <form>
        <button type="submit" tabindex="3">送出</button>

        <label for="wrong-name">姓名</label>
        <input id="wrong-name" name="wrong-name" type="text" tabindex="1">

        <label for="wrong-email">電子郵件</label>
        <input id="wrong-email" name="wrong-email" type="email" tabindex="2">
      </form>
      <p>畫面與 HTML 都先出現「送出」，但焦點被正整數 <code>tabindex</code> 改成另一套順序。</p>
    </div>

    <div class="case right">
      <h3>較好的做法：調整 HTML 順序，不用正整數 tabindex</h3>
      <form>
        <label for="right-name">姓名</label>
        <input id="right-name" name="right-name" type="text">

        <label for="right-email">電子郵件</label>
        <input id="right-email" name="right-email" type="email">

        <button type="submit">送出</button>
      </form>
      <p>HTML 內容順序本身就是使用者操作順序，維護起來比較清楚。</p>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>移除錯誤範例中的三個正整數 <code>tabindex</code>，再把 HTML 調整成「姓名、電子郵件、送出」的順序。</p>
  </section>
</body>
</html>
