<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>contenteditable 基本狀態</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 720px;
    }

    .example {
      border: 1px solid #cccccc;
      margin: 12px 0;
      padding: 12px;
    }

    .editable {
      border-color: #2f8f46;
      background: #f3fff6;
    }

    .locked {
      border-color: #999999;
      background: #f5f5f5;
    }

    .label {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>contenteditable 基本狀態</h1>

  <!-- 觀察重點：contenteditable="true" 與 contenteditable="false" 的差異。 -->

  <section>
    <h2>觀察範例</h2>

    <p class="label">可以直接編輯</p>
    <p class="example editable" contenteditable="true">
      點擊這段文字後，可以直接修改內容。
    </p>

    <p class="label">不可直接編輯</p>
    <p class="example locked" contenteditable="false">
      這段文字設定為不可編輯。
    </p>
  </section>
</body>
</html>
