<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>可編輯不等於自動儲存</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 24px;
    }

    section {
      max-width: 720px;
    }

    #note {
      border: 1px solid #2f8f46;
      background: #f3fff6;
      padding: 12px;
    }

    button {
      margin-top: 8px;
      padding: 6px 12px;
    }

    output {
      display: block;
      border: 1px solid #cccccc;
      margin-top: 12px;
      min-height: 32px;
      padding: 8px;
    }
  </style>
</head>
<body>
  <h1>可編輯不等於自動儲存</h1>

  <!-- 觀察重點：contenteditable 只讓畫面內容可被改動，不會自動保存資料。 -->

  <section>
    <h2>觀察範例</h2>

    <p id="note" contenteditable="true">今天要完成 HTML 筆記。</p>
    <button type="button" id="save">讀取目前文字</button>

    <output id="result">按下按鈕後，這裡會顯示目前讀到的文字。</output>

    <p>重新整理頁面後，內容會回到 HTML 檔案中的原始文字。</p>
  </section>

  <script>
    const note = document.getElementById('note');
    const save = document.getElementById('save');
    const result = document.getElementById('result');

    save.addEventListener('click', function () {
      const currentText = note.textContent.trim();

      result.textContent = currentText;
      console.log(currentText);
    });
  </script>
</body>
</html>
