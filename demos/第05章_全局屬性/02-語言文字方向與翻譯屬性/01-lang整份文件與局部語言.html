<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>lang 整份文件與局部語言</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .example {
      border: 1px solid #ddd;
      padding: 16px 20px;
      max-width: 760px;
    }

    .marked {
      background: #fff4cc;
      padding: 2px 4px;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>lang 整份文件與局部語言</h1>

  <!-- 觀察重點：lang 可以標示整份文件，也可以標示局部不同語言的片段。 -->

  <section>
    <h2>整份文件的主要語言</h2>
    <p>這份 demo 的第一個標籤是：</p>
    <pre><code>&lt;html lang="zh-Hant"&gt;</code></pre>
    <p>它表示整份文件主要使用繁體中文。</p>
  </section>

  <section class="example">
    <h2>局部不同語言</h2>
    <p>
      這是一段中文內容，包含一個英文詞
      <span class="marked" lang="en">accessibility</span>。
    </p>
    <p>
      這本書的英文名稱是
      <cite class="marked" lang="en">How Far Can You Go?</cite>。
    </p>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把其中一個 <code>lang="en"</code> 改成 <code>lang="en-US"</code>，觀察 HTML 如何更精確標示語言地區。</p>
  </section>
</body>
</html>
