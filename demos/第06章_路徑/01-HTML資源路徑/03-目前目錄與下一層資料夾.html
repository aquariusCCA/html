<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>目前目錄與下一層資料夾</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    table {
      border-collapse: collapse;
      margin-bottom: 20px;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f5f5f5;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>目前目錄與下一層資料夾</h1>

  <!-- 觀察重點：./ 表示目前目錄，通常可以省略；資料夾名/檔名表示進入下一層資料夾。 -->

  <section>
    <h2>觀察範例</h2>

    <pre><code>project/
  index.html
  images/
    logo.png</code></pre>

    <table>
      <thead>
        <tr>
          <th>寫法</th>
          <th>意思</th>
          <th>HTML 範例</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><code>images/logo.png</code></td>
          <td>從目前目錄開始，進入 <code>images/</code> 找圖片。</td>
          <td><code>&lt;img src="images/logo.png" alt="網站標誌"&gt;</code></td>
        </tr>
        <tr>
          <td><code>./images/logo.png</code></td>
          <td><code>./</code> 明確表示目前目錄，和上一列代表同一件事。</td>
          <td><code>&lt;img src="./images/logo.png" alt="網站標誌"&gt;</code></td>
        </tr>
      </tbody>
    </table>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>在第二個範例中移除 <code>./</code>，確認 <code>images/logo.png</code> 仍然是從目前目錄開始找。</p>
  </section>
</body>
</html>
