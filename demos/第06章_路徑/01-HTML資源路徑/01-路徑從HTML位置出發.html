<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>路徑從 HTML 位置出發</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      line-height: 1.6;
      margin: 32px;
    }

    .demo-box {
      border: 1px solid #ddd;
      margin-bottom: 20px;
      padding: 16px;
    }

    .current {
      color: #0b5394;
      font-weight: bold;
    }

    .target {
      color: #238636;
      font-weight: bold;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>路徑從 HTML 位置出發</h1>

  <!-- 觀察重點：相對路徑的出發點是目前這份 HTML 檔案所在的位置。 -->

  <section>
    <h2>觀察範例</h2>

    <div class="demo-box">
      <h3>專案結構</h3>
      <pre><code>project/
  <span class="current">index.html</span>
  images/
    <span class="target">logo.png</span></code></pre>

      <p>現在正在編寫的是 <code>index.html</code>，圖片放在同一層的 <code>images/</code> 資料夾裡。</p>
    </div>

    <div class="demo-box">
      <h3>HTML 寫法</h3>
      <pre><code>&lt;img src="images/logo.png" alt="網站標誌"&gt;</code></pre>

      <p>瀏覽器會從 <code>index.html</code> 所在位置出發，進入 <code>images/</code>，再找到 <code>logo.png</code>。</p>
    </div>
  </section>

  <section>
    <h2>修改練習</h2>
    <p>把範例中的 <code>logo.png</code> 改成 <code>product.jpg</code>，觀察路徑最後一段代表檔案名稱。</p>
  </section>
</body>
</html>
