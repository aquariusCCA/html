<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">HTML document structure diagram</title>
  <desc id="desc">A document diagram showing doctype, html, head, title, meta and body sections.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <rect x="52" y="52" width="856" height="436" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <rect x="84" y="92" width="792" height="62" rx="8" fill="#0f766e"/>
  <text x="118" y="132" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">&lt;!DOCTYPE html&gt;</text>
  <rect x="84" y="182" width="792" height="266" rx="8" fill="#ecfeff" stroke="#0f766e" stroke-width="3"/>
  <text x="118" y="224" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#134e4a">&lt;html lang="zh-Hant"&gt;</text>
  <rect x="126" y="252" width="328" height="156" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="154" y="294" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">&lt;head&gt;</text>
  <text x="154" y="336" font-family="Arial, sans-serif" font-size="22" fill="#1e40af">&lt;meta charset="UTF-8"&gt;</text>
  <text x="154" y="374" font-family="Arial, sans-serif" font-size="22" fill="#1e40af">&lt;title&gt;...&lt;/title&gt;</text>
  <rect x="506" y="252" width="328" height="156" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="534" y="294" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#9a3412">&lt;body&gt;</text>
  <text x="534" y="336" font-family="Arial, sans-serif" font-size="22" fill="#9a3412">visible page content</text>
  <text x="534" y="374" font-family="Arial, sans-serif" font-size="22" fill="#9a3412">headings, text, media</text>
</svg>
