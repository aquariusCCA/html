<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe 查錯清單</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #18252b;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f4f8ff;
    }
    main {
      min-height: 100vh;
      padding: 24px;
      border: 8px solid #cddff8;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.2;
    }
    ol {
      margin: 0;
      padding-left: 22px;
    }
    li {
      margin-bottom: 10px;
      line-height: 1.72;
      color: #4f5e6c;
    }
    code {
      padding: 2px 6px;
      border-radius: 6px;
      color: #123f68;
      background: #e2efff;
      font-family: Consolas, "Courier New", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>iframe 顯示失敗時先檢查這些</h1>
    <ol>
      <li><code>src</code> 路徑是否正確，檔案是否存在。</li>
      <li><code>target</code> 是否和 <code>iframe name</code> 完全一致。</li>
      <li>是否忘記替 <code>iframe</code> 加上能描述用途的 <code>title</code>。</li>
      <li>外部網站是否透過 <code>X-Frame-Options</code> 或 <code>frame-ancestors</code> 禁止嵌入。</li>
      <li>是否誤把舊式 <code>frameborder</code> 當成現代主要樣式控制方式。</li>
    </ol>
  </main>
</body>
</html>
