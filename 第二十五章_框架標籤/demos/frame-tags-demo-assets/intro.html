<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe 初始內容</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #1f2a2e;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f8fbf8;
    }
    main {
      display: grid;
      gap: 16px;
      min-height: 100vh;
      padding: 24px;
      align-content: center;
      border: 8px solid #d7e6dc;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    p, li {
      margin: 0;
      line-height: 1.8;
      color: #4c5f58;
    }
    ul {
      margin: 0;
      padding-left: 20px;
    }
    code {
      padding: 2px 6px;
      border-radius: 6px;
      color: #143d33;
      background: #e2f1eb;
      font-family: Consolas, "Courier New", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>這是 iframe 裡的獨立 HTML 文件</h1>
    <p>外層頁面載入了這份本地檔案，但這裡仍然是另一個文件與瀏覽上下文。</p>
    <ul>
      <li><code>src</code> 決定一開始顯示哪份內容。</li>
      <li><code>title</code> 描述這個框架的用途。</li>
      <li>外層連結可以用 <code>target</code> 把新內容載入同一個框架。</li>
    </ul>
  </main>
</body>
</html>
